<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miss OG Tinz — Topic Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: flex-end;
    padding: 28px 32px;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  #card {
    display: flex;
    align-items: center;
    gap: 14px;
    max-width: 580px;

    /* Glass-morphism card */
    background: rgba(10, 6, 20, 0.82);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 14px 20px 14px 16px;
    box-shadow:
      0 0 0 1px rgba(255, 80, 180, 0.15),
      0 8px 40px rgba(0, 0, 0, 0.5),
      inset 0 1px 0 rgba(255,255,255,0.06);

    /* Hidden by default */
    opacity: 0;
    transform: translateY(20px) scale(0.97);
    transition:
      opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
      transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }

  #card.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  /* Left accent bar with animated gradient */
  .accent-bar {
    width: 4px;
    min-height: 44px;
    border-radius: 4px;
    background: linear-gradient(180deg, #ff50b4 0%, #b44eff 50%, #ff8c42 100%);
    background-size: 100% 200%;
    animation: barPulse 3s ease infinite;
    flex-shrink: 0;
  }

  @keyframes barPulse {
    0%   { background-position: 0% 0%; }
    50%  { background-position: 0% 100%; }
    100% { background-position: 0% 0%; }
  }

  .text-block {
    flex: 1;
    min-width: 0;
  }

  .label {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #ff50b4;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ff50b4;
    animation: blink 1.4s ease infinite;
    flex-shrink: 0;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  .source-tag {
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: 'DM Sans', sans-serif;
    text-transform: none;
  }

  #topic-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 440px;
  }

  /* intro line fades in after the title */
  #topic-intro {
    font-size: 11.5px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    line-height: 1.4;
    margin-top: 4px;
    max-width: 440px;

    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #card.visible #topic-intro {
    opacity: 1;
    transform: translateY(0);
  }

  /* Shine sweep on topic change */
  @keyframes shine {
    from { transform: translateX(-100%) skewX(-15deg); }
    to   { transform: translateX(400%) skewX(-15deg); }
  }

  .shine-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    border-radius: 16px;
    pointer-events: none;
  }

  .shine-overlay::after {
    content: '';
    position: absolute;
    top: 0;
    width: 40%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
    animation: shine 0.8s ease forwards;
    animation-play-state: paused;
  }

  #card.new-topic .shine-overlay::after {
    animation-play-state: running;
  }
</style>
</head>
<body>

<div id="card">
  <div class="shine-overlay"></div>
  <div class="accent-bar"></div>
  <div class="text-block">
    <div class="label">
      <span class="live-dot"></span>
      Talking About
      <span class="source-tag" id="topic-source"></span>
    </div>
    <div id="topic-title">—</div>
    <div id="topic-intro"></div>
  </div>
</div>

<script>
  const card   = document.getElementById('card');
  const titleEl  = document.getElementById('topic-title');
  const introEl  = document.getElementById('topic-intro');
  const sourceEl = document.getElementById('topic-source');

  let lastTitle = null;
  let pollInterval = 5000; // ms

  async function fetchTopic() {
    try {
      const res  = await fetch('/chat/topic/current');
      const data = await res.json();

      if (!data.active) {
        hideCard();
        return;
      }

      if (data.title !== lastTitle) {
        showTopic(data);
        lastTitle = data.title;
      }
    } catch (_) {
      // network blip — keep showing last topic
    }
  }

  function showTopic(data) {
    titleEl.textContent  = data.title  || '';
    introEl.textContent  = data.intro  || '';
    sourceEl.textContent = data.source || '';

    // Trigger shine sweep on new topic
    card.classList.remove('new-topic');
    void card.offsetWidth; // reflow
    card.classList.add('new-topic', 'visible');

    setTimeout(() => card.classList.remove('new-topic'), 1000);
  }

  function hideCard() {
    card.classList.remove('visible');
    lastTitle = null;
  }

  // Poll for topic updates
  fetchTopic();
  setInterval(fetchTopic, pollInterval);
</script>
</body>
</html>
