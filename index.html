<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Miss OG Tinz — Live</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --gold: #FFB830;
    --deep: #0a0a0f;
    --panel: rgba(255,255,255,0.04);
    --border: rgba(255,184,48,0.2);
    --glow: rgba(255,184,48,0.15);
    --text: #f0ece0;
    --muted: rgba(240,236,224,0.4);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--deep);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ── Studio background ── */
  #studio-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(255,140,20,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 20% 50%, rgba(255,184,48,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 50%, rgba(255,100,10,0.06) 0%, transparent 60%),
      linear-gradient(180deg, #080810 0%, #0d0d18 60%, #111118 100%);
  }

  /* Dynamic stage light — changes color on events */
  #stage-light {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(255,184,48,0.08) 0%, transparent 70%);
    filter: blur(20px);
    transition: background 1.5s ease;
    pointer-events: none;
    z-index: 1;
  }
  #stage-light.raid   { background: radial-gradient(ellipse, rgba(255,40,40,0.18) 0%, transparent 70%); }
  #stage-light.sub    { background: radial-gradient(ellipse, rgba(80,255,120,0.15) 0%, transparent 70%); }
  #stage-light.bits   { background: radial-gradient(ellipse, rgba(130,80,255,0.18) 0%, transparent 70%); }
  #stage-light.chill  { background: radial-gradient(ellipse, rgba(40,120,255,0.12) 0%, transparent 70%); }
  #stage-light.speak  { background: radial-gradient(ellipse, rgba(255,200,60,0.14) 0%, transparent 70%); }

  /* floor glow */
  #studio-bg::after {
    content:'';
    position:absolute;
    bottom:0; left:50%;
    transform:translateX(-50%);
    width:900px; height:180px;
    background: radial-gradient(ellipse, rgba(255,160,30,0.18) 0%, transparent 70%);
    filter: blur(30px);
  }

  /* stage floor reflection line */
  #stage-floor {
    position: absolute;
    bottom: 58px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,184,48,0.25), transparent);
    z-index: 2;
  }

  /* desk */
  #desk {
    position:absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 620px;
    height: 28px;
    background: linear-gradient(180deg, #2a1f0e 0%, #1a1208 100%);
    border-top: 2px solid rgba(255,184,48,0.4);
    border-radius: 4px 4px 0 0;
    box-shadow: 0 -8px 40px rgba(255,160,30,0.2), 0 4px 20px #000;
    z-index: 5;
  }
  #desk::before {
    content:'';
    position:absolute;
    top:-1px; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity:0.6;
  }

  /* mic prop */
  #mic {
    position:absolute;
    bottom: 88px;
    left: calc(50% + 140px);
    width: 12px;
    height: 70px;
    background: linear-gradient(180deg, #333 0%, #1a1a1a 100%);
    border-radius: 6px;
    z-index: 5;
  }
  #mic::before {
    content:'';
    position:absolute;
    top:-18px; left:50%;
    transform:translateX(-50%);
    width:22px; height:22px;
    border-radius:50%;
    background: radial-gradient(circle, #444, #222);
    border:1px solid #555;
    box-shadow: 0 0 10px rgba(255,184,48,0.3);
  }

  /* ── Canvas ── */
  #canvas {
    position:absolute;
    inset:0;
    width:100%; height:100%;
    z-index: 3;
  }

  /* ── Chat bubble ── */
  #chat-bubble {
    position:absolute;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(10,10,15,0.85);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 22px;
    max-width: 600px;
    min-width: 200px;
    text-align:center;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    color: var(--text);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(255,184,48,0.1), 0 8px 32px rgba(0,0,0,0.5);
    opacity:0;
    transition: opacity 0.4s, transform 0.4s;
    z-index:20;
  }
  #chat-bubble.visible {
    opacity:1;
    transform: translateX(-50%) translateY(0);
  }
  #chat-bubble .speaker {
    font-size:11px;
    color: var(--gold);
    font-weight:500;
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-bottom:4px;
  }

  /* ── Name plate ── */
  #nameplate {
    position:absolute;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%);
    display:flex;
    align-items:center;
    gap:10px;
    z-index:15;
  }
  #nameplate .dot {
    width:8px; height:8px;
    border-radius:50%;
    background:var(--gold);
    box-shadow: 0 0 8px var(--gold);
    animation: pulse 2s infinite;
  }
  #nameplate .name {
    font-family:'Syne', sans-serif;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--gold);
  }
  #nameplate .tag {
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.05em;
  }

  /* ── Live badge ── */
  #live-badge {
    position:absolute;
    top:24px; right:24px;
    display:flex;
    align-items:center;
    gap:7px;
    background:rgba(255,30,30,0.15);
    border:1px solid rgba(255,60,60,0.3);
    border-radius:20px;
    padding:6px 14px;
    z-index:20;
  }
  #live-badge .dot {
    width:7px; height:7px;
    border-radius:50%;
    background:#ff3030;
    box-shadow:0 0 8px #ff3030;
    animation: pulse 1.5s infinite;
  }
  #live-badge span {
    font-family:'Syne',sans-serif;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.15em;
    color:#ff6060;
  }

  /* ── Status ── */
  #status {
    position:absolute;
    top:24px; left:24px;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.05em;
    z-index:20;
  }
  #status.ready   { color: #60ff90; }
  #status.thinking { color: var(--gold); }
  #status.error   { color: #ff6060; }

  /* ── Topic box ── */
  #topic-box {
    position: absolute;
    bottom: 110px;
    left: 24px;
    max-width: 320px;
    z-index: 25;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.5s cubic-bezier(0.34,1.56,0.64,1),
                transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  #topic-box.visible { opacity: 1; transform: translateY(0); }
  #topic-box-inner {
    background: rgba(10,10,15,0.88);
    border: 1px solid rgba(255,184,48,0.25);
    border-left: 3px solid var(--gold);
    border-radius: 0 12px 12px 0;
    padding: 10px 14px;
    backdrop-filter: blur(14px);
    box-shadow: 0 0 24px rgba(255,184,48,0.08), 0 6px 24px rgba(0,0,0,0.5);
    overflow: hidden;
    position: relative;
  }
  #topic-box-inner::after {
    content: '';
    position: absolute;
    top: 0; left: -60%;
    width: 40%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    transform: skewX(-15deg);
    transition: none;
  }
  #topic-box.new-topic #topic-box-inner::after {
    animation: topicShine 0.7s ease forwards;
  }
  @keyframes topicShine {
    from { left: -60%; }
    to   { left: 140%; }
  }
  #topic-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 5px;
  }
  #topic-label .tdot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 6px var(--gold);
    animation: pulse 1.6s infinite;
    flex-shrink: 0;
  }
  #topic-source-tag {
    font-size: 8px;
    font-weight: 500;
    color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    padding: 1px 5px;
    letter-spacing: 0.04em;
    font-family: 'DM Sans', sans-serif;
    text-transform: none;
  }
  #topic-title-text {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.35;
  }

  /* ── Chat input ── */
  #chat-input-area {
    position:absolute;
    bottom:16px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:8px;
    z-index:30;
    width:580px;
  }
  #chat-input {
    flex:1;
    background:rgba(255,255,255,0.06);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 16px;
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    font-size:13px;
    outline:none;
  }
  #chat-input::placeholder { color:var(--muted); }
  #chat-input:focus { border-color:rgba(255,184,48,0.5); }
  #send-btn {
    background:var(--gold);
    color:#0a0a0f;
    border:none;
    border-radius:10px;
    padding:10px 20px;
    font-family:'Syne',sans-serif;
    font-size:12px;
    font-weight:700;
    letter-spacing:0.08em;
    cursor:pointer;
    transition:opacity 0.2s;
  }
  #send-btn:hover { opacity:0.85; }
  #send-btn:disabled { opacity:0.4; cursor:default; }

  @keyframes pulse {
    0%,100%{ opacity:1; }
    50%{ opacity:0.4; }
  }

  /* loading overlay */
  #loader {
    position:absolute;
    inset:0;
    background:var(--deep);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:16px;
    z-index:100;
    transition:opacity 0.6s;
  }
  #loader.hidden { opacity:0; pointer-events:none; }
  #loader .logo {
    font-family:'Syne',sans-serif;
    font-size:28px;
    font-weight:800;
    color:var(--gold);
    letter-spacing:0.1em;
  }
  #loader .sub {
    font-size:12px;
    color:var(--muted);
    letter-spacing:0.1em;
  }
  #loader .bar {
    width:200px; height:2px;
    background:rgba(255,255,255,0.08);
    border-radius:2px;
    overflow:hidden;
  }
  #loader .bar-fill {
    height:100%;
    background:var(--gold);
    width:0%;
    transition:width 0.3s;
    border-radius:2px;
  }

  /* ── Control Panel ── */
  #control-panel {
    position:fixed;
    top:50%;
    right:0;
    transform:translateY(-50%);
    background:rgba(10,10,15,0.92);
    border:1px solid var(--border);
    border-right:none;
    border-radius:12px 0 0 12px;
    padding:14px;
    width:220px;
    z-index:50;
    backdrop-filter:blur(12px);
    font-size:12px;
    transition: transform 0.3s;
  }
  #control-panel.hidden { transform: translateY(-50%) translateX(225px); }
  #panel-toggle {
    position:fixed;
    top:50%;
    right:0;
    transform:translateY(-50%);
    background:var(--gold);
    color:#000;
    border:none;
    border-radius:8px 0 0 8px;
    padding:10px 6px;
    cursor:pointer;
    font-family:'Syne',sans-serif;
    font-size:10px;
    font-weight:700;
    writing-mode:vertical-rl;
    letter-spacing:0.1em;
    z-index:51;
    transition: right 0.3s;
  }
  #panel-toggle.open { right: 221px; }
  .ctrl-label {
    color:var(--gold);
    font-family:'Syne',sans-serif;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin:10px 0 4px;
    font-size:10px;
  }
  .ctrl-label:first-child { margin-top:0; }
  .ctrl-row {
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:6px;
  }
  .ctrl-row label { color:var(--muted); width:20px; font-size:11px; }
  .ctrl-row input[type=range] {
    flex:1;
    accent-color:var(--gold);
    height:3px;
  }
  .ctrl-row span { color:var(--text); width:36px; font-size:10px; text-align:right; }
  .ctrl-row input[type=color] {
    width:32px; height:22px;
    border:1px solid var(--border);
    border-radius:4px;
    background:none;
    cursor:pointer;
    padding:1px;
  }
  .ctrl-sep { border:none; border-top:1px solid var(--border); margin:10px 0; }
  .ctrl-btn {
    width:100%;
    background:rgba(255,184,48,0.12);
    border:1px solid var(--border);
    border-radius:6px;
    color:var(--gold);
    font-family:'Syne',sans-serif;
    font-size:10px;
    font-weight:700;
    letter-spacing:0.08em;
    padding:6px;
    cursor:pointer;
    margin-top:4px;
  }
  .ctrl-btn:hover { background:rgba(255,184,48,0.25); }
</style>
</head>
<body>

<div id="loader">
  <div class="logo">MISS OG TINZ</div>
  <div class="sub">Loading avatar...</div>
  <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
</div>

<div id="studio-bg"></div>
<div id="stage-light"></div>
<div id="stage-floor"></div>
<div id="desk"></div>
<div id="mic"></div>

<canvas id="canvas"></canvas>

<div id="live-badge">
  <div class="dot"></div>
  <span>LIVE</span>
</div>

<div id="status">Initialising...</div>

<div id="topic-box">
  <div id="topic-box-inner">
    <div id="topic-label">
      <div class="tdot"></div>
      Talking About
      <span id="topic-source-tag"></span>
    </div>
    <div id="topic-title-text"></div>
  </div>
</div>

<div id="chat-bubble">
  <div class="speaker">Miss OG Tinz</div>
  <div id="bubble-text">Heyyy! Welcome to the stream!</div>
</div>

<div id="nameplate">
  <div class="dot"></div>
  <div class="name">Miss OG Tinz</div>
  <div class="tag">AI Presenter</div>
</div>

<div id="chat-input-area">
  <input id="chat-input" type="text" placeholder="Chat with Miss OG Tinz..." maxlength="200"/>
  <button id="send-btn">SEND</button>
</div>

<!-- Twitch chat library -->
<script src="https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/build/tmi.min.js"></script>

<!-- Three.js + VRM -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

// ── Config ─────────────────────────────────────────────
const VRM_PATH      = '/Streaming-engine/MissOgTinz_Master.vrm';
const API_URL       = 'https://impactgrid-dijo.onrender.com/chat/message';
const PROACTIVE_URL = 'https://impactgrid-dijo.onrender.com/chat/proactive';
const TOPIC_URL     = 'https://impactgrid-dijo.onrender.com/chat/topic/current';
const USER_ID       = 'stream-viewer-' + Math.random().toString(36).slice(2,8);
const TTS_URL       = 'https://impactgrid-dijo.onrender.com/tts';
const TWITCH_CHANNEL = 'Miss_ogtinz';

// ── Elements ────────────────────────────────────────────
const canvas      = document.getElementById('canvas');
const loader_el   = document.getElementById('loader');
const bar_fill    = document.getElementById('bar-fill');
const status_el   = document.getElementById('status');
const bubble      = document.getElementById('chat-bubble');
const bubbleTxt   = document.getElementById('bubble-text');
const chatInput   = document.getElementById('chat-input');
const sendBtn     = document.getElementById('send-btn');
const stageLight  = document.getElementById('stage-light');

// ── Topic box elements ───────────────────────────────────
const topicBox      = document.getElementById('topic-box');
const topicTitleEl  = document.getElementById('topic-title-text');
const topicSourceEl = document.getElementById('topic-source-tag');
let   lastTopicTitle = null;

function setStatus(msg, cls='') {
  status_el.textContent = msg;
  status_el.className = cls;
}
function setProgress(p) { bar_fill.style.width = p + '%'; }

// ── Stage light control ──────────────────────────────────
function setStageLight(mood, durationMs = 4000) {
  stageLight.className = mood;
  if (mood !== '') {
    setTimeout(() => { stageLight.className = ''; }, durationMs);
  }
}

// ── Three.js Scene ──────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 0.1, 999999);
camera.position.set(0, 0.8, 4);
camera.lookAt(0, 0.8, 0);

// Lighting
const ambient   = new THREE.AmbientLight(0xffffff, 1.2);
scene.add(ambient);
const keyLight  = new THREE.DirectionalLight(0xfff5e0, 2.5);
keyLight.position.set(1.5, 3, 2);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xffe0b0, 1.2);
fillLight.position.set(-2, 1, 1);
scene.add(fillLight);
const rimLight  = new THREE.DirectionalLight(0xffb830, 0.4);
rimLight.position.set(0, 2, -3);
scene.add(rimLight);

// ── Camera state machine ─────────────────────────────────
// Three modes: IDLE (wide), SPEAK (close), THINK (medium + slight angle)
const CAM = {
  IDLE:  { z: null, y: null, lookY: null, rotY: 0 },       // filled after VRM loads
  SPEAK: { z: null, y: null, lookY: null, rotY: 0 },
  THINK: { z: null, y: null, lookY: null, rotY: 0.04 },
};

let camTarget   = { z: 4, y: 0.8, lookY: 0.8, rotY: 0 };
let camCurrent  = { z: 4, y: 0.8, lookY: 0.8, rotY: 0 };
const CAM_LERP  = 0.035; // smoothness — lower = slower/smoother

function setCamMode(mode) {
  const t = CAM[mode];
  if (!t || t.z === null) return;
  camTarget.z     = t.z;
  camTarget.y     = t.y;
  camTarget.lookY = t.lookY;
  camTarget.rotY  = t.rotY;
}

// ── Load VRM ────────────────────────────────────────────
let vrm   = null;
let mixer = null;

const gltfLoader = new GLTFLoader();
gltfLoader.register(parser => new VRMLoaderPlugin(parser));

setProgress(10);
setStatus('Loading Miss OG Tinz...');

gltfLoader.load(
  VRM_PATH,
  (gltf) => {
    setProgress(80);
    vrm = gltf.userData.vrm;
    VRMUtils.removeUnnecessaryJoints(gltf.scene);

    const MESH_COLOURS = {
      Julie_Figure: 0xc68642,
      Brow:         0x1a0a00,
      Teargum:      0xc68642,
      Ear_Jewel:    0xFFD700,
      Eye_R:        0x3b2314,
      Eyes_L:       0x3b2314,
      Lashes:       0x050505,
      Teeth:        0xfffaf0,
      Hair_Block:   0x0d0d0d,
      Top:          0xff69b4,
      Bottom:       0xff1493,
      Shoe_R:       0x222222,
      Shoe_L:       0x222222,
      Necklece:     0xFFD700,
    };

    vrm.scene.traverse((obj) => {
      if (!obj.isMesh) return;
      obj.frustumCulled = false;
      const name      = obj.name;
      const isMetallic = name.includes('Jewel') || name.includes('Necklece');
      const isSkin     = name === 'Julie_Figure' || name === 'Teargum';
      const isEye      = name === 'Eye_R' || name === 'Eyes_L';
      const isLash     = name === 'Lashes';
      const isTooth    = name === 'Teeth';

      if (isEye) {
        const eyeCanvas  = document.createElement('canvas');
        eyeCanvas.width  = 128;
        eyeCanvas.height = 128;
        const ctx = eyeCanvas.getContext('2d');
        ctx.fillStyle = '#f5f0e8'; ctx.fillRect(0,0,128,128);
        const grad = ctx.createRadialGradient(64,64,4, 64,64,38);
        grad.addColorStop(0,'#1a0a00'); grad.addColorStop(0.4,'#3b1f0a');
        grad.addColorStop(0.8,'#5c3010'); grad.addColorStop(1,'#2a1205');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(64,64,38,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#050202'; ctx.beginPath(); ctx.arc(64,64,18,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.beginPath(); ctx.arc(74,52,8,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath(); ctx.arc(54,72,4,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#0d0500'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(64,64,38,0,Math.PI*2); ctx.stroke();
        const eyeTex = new THREE.CanvasTexture(eyeCanvas);
        obj.material = new THREE.MeshStandardMaterial({
          map: eyeTex, roughness: 0.05, metalness: 0.0, side: THREE.FrontSide,
        });
      } else if (isLash) {
        obj.material = new THREE.MeshStandardMaterial({
          color: 0x050202, roughness: 0.9, metalness: 0, side: THREE.DoubleSide,
        });
      } else if (isTooth) {
        obj.material = new THREE.MeshStandardMaterial({
          color: 0xfff8f0, roughness: 0.4, metalness: 0, side: THREE.FrontSide,
        });
      } else {
        const hexColour = MESH_COLOURS[name] ?? 0xb5743a;
        obj.material = new THREE.MeshStandardMaterial({
          color:      hexColour,
          roughness:  isSkin ? 0.52 : isMetallic ? 0.18 : 0.72,
          metalness:  isMetallic ? 0.88 : 0.0,
          side:       THREE.FrontSide,
          depthWrite: true,
        });
      }
    });

    VRMUtils.rotateVRM0(vrm);
    vrm.scene.scale.set(1,1,1);
    vrm.scene.position.set(0,0,0);
    scene.add(vrm.scene);

    const boxRaw    = new THREE.Box3().setFromObject(vrm.scene);
    const sizeRaw   = boxRaw.getSize(new THREE.Vector3());
    const centerRaw = boxRaw.getCenter(new THREE.Vector3());
    const scaleVal  = 1.7 / sizeRaw.y;
    vrm.scene.scale.set(scaleVal, scaleVal, scaleVal);
    vrm.scene.position.set(
      -centerRaw.x * scaleVal,
      -boxRaw.min.y * scaleVal,
      -centerRaw.z * scaleVal
    );

    const box  = new THREE.Box3().setFromObject(vrm.scene);
    const size = box.getSize(new THREE.Vector3());
    console.log("VRM final size:", size);

    cacheBones();

    // ── Auto-fit camera then set all cam presets relative to model ──
    const fovRad  = camera.fov * (Math.PI / 180);
    const fitZ    = (size.y / 2) / Math.tan(fovRad / 2) * 1.18;
    const midY    = size.y * 0.5;
    const headY   = size.y * 0.88;

    CAM.IDLE  = { z: fitZ,        y: midY,       lookY: midY,       rotY: 0 };
    CAM.SPEAK = { z: fitZ * 0.62, y: headY * 0.9, lookY: headY * 0.85, rotY: 0 };
    CAM.THINK = { z: fitZ * 0.80, y: midY * 1.1, lookY: midY,       rotY: 0.04 };

    camTarget  = { ...CAM.IDLE };
    camCurrent = { ...CAM.IDLE };
    camera.position.set(0, camCurrent.y, camCurrent.z);
    camera.lookAt(0, camCurrent.lookY, 0);

    // ── Pacing extents — she walks within ±40% of half the model height ──
    PACE.xMax = size.x * 1.8;

    setProgress(100);
    setTimeout(() => {
      loader_el.classList.add('hidden');
      setStatus('Ready ✦', 'ready');
      showBubble("Heyyy! Welcome to the stream! What's good?", "Miss OG Tinz");
      startTopicPolling();
      deadAir.start();
      initTwitchChat();
    }, 400);
  },
  (progress) => {
    const p = 10 + (progress.loaded / (progress.total || 1)) * 65;
    setProgress(Math.min(p, 75));
  },
  (error) => {
    console.error(error);
    setStatus('Failed to load VRM — check file path', 'error');
    loader_el.querySelector('.sub').textContent = 'Error loading avatar. Check console.';
  }
);

// ── Blendshape helpers ──────────────────────────────────

// ── Lip Sync ────────────────────────────────────────────

// ── Expression mapping ──────────────────────────────────
function setExpression(mood) {
  ['happy','angry','sad','relaxed','surprised'].forEach(e => setBS(e, 0));
  ['joy','angry','sorrow','fun','neutral'].forEach(e => setBS(e, 0));
  const map = {
    happy:     () => { setBS('joy',0.8); setBS('happy',0.8); },
    excited:   () => { setBS('joy',1.0); setBS('fun',0.6); },
    angry:     () => { setBS('angry',0.7); },
    sad:       () => { setBS('sorrow',0.7); setBS('sad',0.6); },
    neutral:   () => { setBS('neutral',0.3); },
    surprised: () => { setBS('surprised',0.8); }
  };
  (map[mood] || map.neutral)();
}

// ── Bone cache ───────────────────────────────────────────
let boneHead=null, boneSpine=null, boneChest=null;
let boneHips=null;
let boneHipL=null, boneHipR=null;
let boneLUpperLeg=null, boneRUpperLeg=null;
let boneLLowerLeg=null, boneRLowerLeg=null;
let boneLUpperArm=null, boneRUpperArm=null;
let boneLLowerArm=null, boneRLowerArm=null;

function cacheBones() {
  if (!vrm || !vrm.humanoid) return;
  const h         = vrm.humanoid;
  boneHead        = h.getNormalizedBoneNode('head');
  boneSpine       = h.getNormalizedBoneNode('spine');
  boneChest       = h.getNormalizedBoneNode('chest');
  boneHips        = h.getNormalizedBoneNode('hips');
  boneHipL        = h.getNormalizedBoneNode('leftUpperLeg');
  boneHipR        = h.getNormalizedBoneNode('rightUpperLeg');
  boneLUpperLeg   = h.getNormalizedBoneNode('leftUpperLeg');
  boneRUpperLeg   = h.getNormalizedBoneNode('rightUpperLeg');
  boneLLowerLeg   = h.getNormalizedBoneNode('leftLowerLeg');
  boneRLowerLeg   = h.getNormalizedBoneNode('rightLowerLeg');
  boneLUpperArm   = h.getNormalizedBoneNode('leftUpperArm');
  boneRUpperArm   = h.getNormalizedBoneNode('rightUpperArm');
  boneLLowerArm   = h.getNormalizedBoneNode('leftLowerArm');
  boneRLowerArm   = h.getNormalizedBoneNode('rightLowerArm');
  console.log('Bones cached:', { boneHead, boneSpine, boneLUpperLeg, boneRUpperLeg });
}

// ================================================================
//  PHASE 1A — IDLE PACING SYSTEM
//  She walks left/right across the stage naturally.
//  Uses a simple waypoint system: pick a target X, walk to it,
//  pause, pick another. Leg/hip bones animate in sync.
// ================================================================

const PACE = {
  xMax:        2.0,    // filled after VRM loads (model-relative)
  x:           0,      // current world X position
  targetX:     0,      // where she's heading
  speed:       0.006,  // units per frame at 60fps
  walkTime:    0,      // accumulator used for leg cycle
  pauseTimer:  0,      // countdown until next move
  pauseLen:    0,      // how long to pause (randomised)
  state:       'pause',// 'walk' | 'pause'
  dir:         1,      // +1 right, -1 left (facing direction)
  facingAngle: 0,      // current Y rotation of scene (smooth)
  targetFacingAngle: 0,
};

function pacePickTarget() {
  // pick a new X between -xMax and +xMax, biased away from center
  const halfMax   = PACE.xMax * 0.5;
  const sign      = Math.random() > 0.5 ? 1 : -1;
  const distance  = halfMax + Math.random() * halfMax;
  PACE.targetX    = Math.max(-PACE.xMax, Math.min(PACE.xMax, sign * distance));
  PACE.state      = 'walk';
  PACE.dir        = PACE.targetX > PACE.x ? 1 : -1;
  PACE.targetFacingAngle = PACE.dir === 1 ? -0.12 : 0.12; // slight body turn toward travel dir
}

function paceUpdate(delta) {
  if (!vrm) return;

  if (PACE.state === 'pause') {
    PACE.pauseTimer -= delta;
    if (PACE.pauseTimer <= 0) pacePickTarget();

    // idle leg micro-sway while paused
    if (boneLUpperLeg) boneLUpperLeg.rotation.x = Math.sin(PACE.walkTime * 0.6) * 0.015;
    if (boneRUpperLeg) boneRUpperLeg.rotation.x = Math.sin(PACE.walkTime * 0.6 + Math.PI) * 0.015;

  } else {
    // walking
    PACE.walkTime += delta;
    const step     = PACE.speed * (delta / 0.016); // normalise to ~60fps
    const remaining = PACE.targetX - PACE.x;

    if (Math.abs(remaining) < 0.02) {
      // arrived — start pause
      PACE.x              = PACE.targetX;
      PACE.state          = 'pause';
      PACE.pauseLen       = 3 + Math.random() * 8; // 3–11s pause
      PACE.pauseTimer     = PACE.pauseLen;
      PACE.targetFacingAngle = 0; // face forward during pause
      resetWalkPose();
    } else {
      PACE.x += Math.sign(remaining) * Math.min(step, Math.abs(remaining));

      // ── Leg animation ──────────────────────────────────
      const freq  = 5.5;  // walk cycle frequency
      const amp   = 0.32; // leg swing amplitude
      const tilt  = 0.08; // lateral hip tilt amplitude

      // Opposite legs swing together (natural walking gait)
      if (boneLUpperLeg) {
        boneLUpperLeg.rotation.x =  Math.sin(PACE.walkTime * freq) * amp;
        boneLUpperLeg.rotation.z =  Math.sin(PACE.walkTime * freq) * tilt * 0.3;
      }
      if (boneRUpperLeg) {
        boneRUpperLeg.rotation.x = -Math.sin(PACE.walkTime * freq) * amp;
        boneRUpperLeg.rotation.z = -Math.sin(PACE.walkTime * freq) * tilt * 0.3;
      }
      if (boneLLowerLeg) {
        // knee bend — only bends backward (clamped), follows thigh with slight delay
        boneLLowerLeg.rotation.x = Math.max(0, Math.sin(PACE.walkTime * freq + 0.8)) * amp * 0.55;
      }
      if (boneRLowerLeg) {
        boneRLowerLeg.rotation.x = Math.max(0, -Math.sin(PACE.walkTime * freq + 0.8)) * amp * 0.55;
      }

      // ── Hip counter-rotation (natural sway) ─────────────
      if (boneHips) {
        boneHips.rotation.y = Math.sin(PACE.walkTime * freq) * tilt * 0.4;
        boneHips.rotation.z = Math.sin(PACE.walkTime * freq * 0.5) * tilt;
      }

      // ── Arm counter-swing (opposite to legs) ─────────────
      if (boneLUpperArm) {
        boneLUpperArm.rotation.x = -Math.sin(PACE.walkTime * freq) * 0.12;
        boneLUpperArm.rotation.z =  1.1 + Math.sin(PACE.walkTime * 1.3) * 0.04;
      }
      if (boneRUpperArm) {
        boneRUpperArm.rotation.x =  Math.sin(PACE.walkTime * freq) * 0.12;
        boneRUpperArm.rotation.z = -1.1 - Math.sin(PACE.walkTime * 1.3) * 0.04;
      }

      // ── Chest bob up/down while walking ─────────────────
      if (boneChest) {
        boneChest.rotation.x = Math.sin(PACE.walkTime * freq * 2) * 0.012;
      }
    }
  }

  // ── Apply world X position ──────────────────────────────
  vrm.scene.position.x += (PACE.x - vrm.scene.position.x) * 0.08;

  // ── Smooth facing direction ──────────────────────────────
  PACE.facingAngle += (PACE.targetFacingAngle - PACE.facingAngle) * 0.06;
  vrm.scene.rotation.y = PACE.facingAngle;
}

function resetWalkPose() {
  // Smoothly return legs to neutral — handled by idle lerp in render loop
  if (boneLUpperLeg) { boneLUpperLeg.rotation.x = 0; boneLUpperLeg.rotation.z = 0; }
  if (boneRUpperLeg) { boneRUpperLeg.rotation.x = 0; boneRUpperLeg.rotation.z = 0; }
  if (boneLLowerLeg) boneLLowerLeg.rotation.x = 0;
  if (boneRLowerLeg) boneRLowerLeg.rotation.x = 0;
  if (boneHips)      { boneHips.rotation.y = 0; boneHips.rotation.z = 0; }
}

// ── Initialise pacing with random first pause so she doesn't
//    immediately march on load
PACE.state      = 'pause';
PACE.pauseLen   = 2 + Math.random() * 3;
PACE.pauseTimer = PACE.pauseLen;


// ================================================================
//  PHASE 2 — HYPE ANIMATION SYSTEM
//
//  Each Twitch event gets a multi-stage full-body choreography.
//  Stages run sequentially: each has a duration and a per-frame
//  bone-animation function. Pacing is paused for the whole sequence.
//
//  Events:
//    raidDance      — raid: full bounce, arm pump, hip sway, step in
//    subCelebration — new sub: jump, clap arms, step toward cam
//    resubHype      — resub: shoulder shimmy, point at camera
//    bitsDazzle     — bits: surprised spin, blows kiss, shimmy down
//    giftPop        — gift sub: both arms up, excited bounce
//
//  Lower-priority gestures (talk, think, wave) still exist for chat.
// ================================================================

let gesture         = null;
let gestureTime     = 0;
let gestureDuration = 0;

// ── Simple single-function gestures (chat / idle) ─────────────
const GESTURES = {
  think: (t) => {
    if (!boneLUpperArm || !boneRUpperArm) return;
    boneLUpperArm.rotation.z =  1.1 + Math.sin(t*0.8)*0.03;
    boneRUpperArm.rotation.z = -(0.5 + Math.sin(t*0.6)*0.04);
    boneRUpperArm.rotation.x =  0.6 + Math.sin(t*0.4)*0.02;
    if (boneRLowerArm) boneRLowerArm.rotation.z = -(0.9 + Math.sin(t*0.5)*0.02);
  },
  talk: (t) => {
    if (!boneLUpperArm || !boneRUpperArm) return;
    const wave = Math.sin(t*6)*0.12;
    boneLUpperArm.rotation.z =  0.8 + wave;
    boneRUpperArm.rotation.z = -(0.8 + wave*0.7);
    boneLUpperArm.rotation.x = 0.15 + Math.sin(t*4)*0.08;
    boneRUpperArm.rotation.x = 0.15 + Math.sin(t*4+1)*0.08;
    if (boneLLowerArm) boneLLowerArm.rotation.z =  0.5 + Math.sin(t*5)*0.1;
    if (boneRLowerArm) boneRLowerArm.rotation.z = -(0.5 + Math.sin(t*5+0.5)*0.1);
  },
  wave: (t) => {
    if (!boneRUpperArm) return;
    boneRUpperArm.rotation.z = -(0.3 + Math.sin(t*8)*0.25);
    boneRUpperArm.rotation.x =  0.3;
    if (boneRLowerArm) boneRLowerArm.rotation.z = -(0.2 + Math.sin(t*8+0.5)*0.2);
    if (boneLUpperArm) boneLUpperArm.rotation.z =  1.1;
  },
  excited: (t) => {
    if (!boneLUpperArm || !boneRUpperArm) return;
    boneLUpperArm.rotation.z =  0.4 + Math.sin(t*7)*0.15;
    boneRUpperArm.rotation.z = -(0.4 + Math.sin(t*7+0.3)*0.15);
    boneLUpperArm.rotation.x =  0.2; boneRUpperArm.rotation.x = 0.2;
    if (boneSpine) boneSpine.rotation.y = Math.sin(t*7)*0.06;
  },
};

function doGesture(name, durationMs = 3000) {
  // Don't interrupt a hype sequence with a low-priority gesture
  if (hyper.active) return;
  gesture = name; gestureTime = 0; gestureDuration = durationMs / 1000;
}

function gestureActive() { return gesture !== null || hyper.active; }

// ── Hype sequence engine ─────────────────────────────────────
// A sequence = array of { dur (seconds), fn(t, progress) }
// t = time within this stage, progress = 0→1 within this stage

const hyper = {
  active:     false,
  stages:     [],
  stageIdx:   0,
  stageTimer: 0,
  onDone:     null,   // callback when sequence ends
};

function playHype(stages, onDone) {
  // Freeze pacing while hype plays — store state to restore
  hyper._paceSavedState  = PACE.state;
  hyper._paceSavedTimer  = PACE.pauseTimer;
  PACE.state             = 'pause';
  PACE.pauseTimer        = 99999;
  PACE.targetFacingAngle = 0; // face forward for all hype events

  hyper.active     = true;
  hyper.stages     = stages;
  hyper.stageIdx   = 0;
  hyper.stageTimer = 0;
  hyper.onDone     = onDone || null;

  // Move camera to SPEAK for full effect
  setCamMode('SPEAK');
}

function hyperUpdate(delta) {
  if (!hyper.active) return;
  const stage = hyper.stages[hyper.stageIdx];
  if (!stage) { _hyperFinish(); return; }

  hyper.stageTimer += delta;
  const progress = Math.min(hyper.stageTimer / stage.dur, 1);
  stage.fn(hyper.stageTimer, progress);

  if (hyper.stageTimer >= stage.dur) {
    hyper.stageIdx++;
    hyper.stageTimer = 0;
    if (hyper.stageIdx >= hyper.stages.length) _hyperFinish();
  }
}

function _hyperFinish() {
  hyper.active   = false;
  hyper.stages   = [];
  hyper.stageIdx = 0;
  // Restore pacing
  PACE.state      = hyper._paceSavedState || 'pause';
  PACE.pauseTimer = 2 + Math.random() * 4; // short pause before resuming walk
  setCamMode('IDLE');
  if (hyper.onDone) hyper.onDone();
}

// ── Helper: ease in-out ───────────────────────────────────────
function easeInOut(p) { return p < 0.5 ? 2*p*p : -1+(4-2*p)*p; }

// ================================================================
//  HYPE CHOREOGRAPHIES
// ================================================================

// ── RAID DANCE (8s) ──────────────────────────────────────────
// Stage 1 (1s): freeze, look surprised — eyes wide, arms snap up
// Stage 2 (2s): arms pump up/down fast, chest bounces, hip sway
// Stage 3 (2s): full body bounce + lateral hip shimmy
// Stage 4 (2s): step forward toward camera, both arms out wide
// Stage 5 (1s): settle back, face camera, big smile arms

function triggerRaidDance() {
  setCamMode('IDLE'); // start wide so viewer sees full body

  playHype([
    // Stage 1 — shocked freeze
    { dur: 0.8, fn: (t, p) => {
      const snap = easeInOut(p);
      if (boneLUpperArm) { boneLUpperArm.rotation.z = 1.1 - snap*0.7; boneLUpperArm.rotation.x = snap*0.5; }
      if (boneRUpperArm) { boneRUpperArm.rotation.z = -(1.1 - snap*0.7); boneRUpperArm.rotation.x = snap*0.5; }
      if (boneHead) boneHead.rotation.x = snap * 0.12;
      if (boneSpine) boneSpine.rotation.x = snap * 0.06;
      setExpression('surprised');
    }},
    // Stage 2 — arms pump, chest bounce
    { dur: 2.2, fn: (t, p) => {
      const pump = Math.sin(t * 10) * 0.28;
      const bounce = Math.abs(Math.sin(t * 10)) * 0.04;
      if (boneLUpperArm) { boneLUpperArm.rotation.z = 0.35 + pump; boneLUpperArm.rotation.x = 0.45 + bounce; }
      if (boneRUpperArm) { boneRUpperArm.rotation.z = -(0.35 + pump); boneRUpperArm.rotation.x = 0.45 + bounce; }
      if (boneLLowerArm) boneLLowerArm.rotation.z =  0.6 + Math.abs(pump)*0.5;
      if (boneRLowerArm) boneRLowerArm.rotation.z = -(0.6 + Math.abs(pump)*0.5);
      if (boneSpine) { boneSpine.rotation.x = bounce*1.5; boneSpine.rotation.z = Math.sin(t*5)*0.04; }
      if (boneHips)  boneHips.rotation.z = Math.sin(t*5) * 0.09;
      if (boneLUpperLeg) boneLUpperLeg.rotation.x = Math.sin(t*10)*0.08;
      if (boneRUpperLeg) boneRUpperLeg.rotation.x = -Math.sin(t*10)*0.08;
      setExpression('excited');
    }},
    // Stage 3 — hip shimmy + full body sway
    { dur: 2.2, fn: (t, p) => {
      const sway = Math.sin(t * 7) * 0.18;
      const bob  = Math.abs(Math.sin(t * 7)) * 0.05;
      if (boneHips)  { boneHips.rotation.z = sway; boneHips.rotation.y = sway*0.4; }
      if (boneSpine) { boneSpine.rotation.z = -sway*0.5; boneSpine.rotation.x = bob; }
      if (boneChest) boneChest.rotation.z = sway * 0.3;
      if (boneLUpperArm) { boneLUpperArm.rotation.z = 0.5 + Math.sin(t*7+1)*0.2; boneLUpperArm.rotation.x = 0.3+bob; }
      if (boneRUpperArm) { boneRUpperArm.rotation.z = -(0.5 + Math.sin(t*7)*0.2); boneRUpperArm.rotation.x = 0.3+bob; }
      if (boneLUpperLeg) boneLUpperLeg.rotation.z =  sway*0.35;
      if (boneRUpperLeg) boneRUpperLeg.rotation.z = -sway*0.35;
    }},
    // Stage 4 — step toward camera, arms wide open (welcoming raid)
    { dur: 2.0, fn: (t, p) => {
      const ep    = easeInOut(Math.min(p*2,1));
      const retract = p > 0.5 ? easeInOut((p-0.5)*2) : 0;
      if (vrm) vrm.scene.position.z = ep * 0.18 - retract * 0.18;
      if (boneLUpperArm) { boneLUpperArm.rotation.z = 0.3 - ep*0.25; boneLUpperArm.rotation.x = ep*0.35; }
      if (boneRUpperArm) { boneRUpperArm.rotation.z = -(0.3 - ep*0.25); boneRUpperArm.rotation.x = ep*0.35; }
      if (boneLLowerArm) boneLLowerArm.rotation.z =  0.2 + ep*0.15;
      if (boneRLowerArm) boneRLowerArm.rotation.z = -(0.2 + ep*0.15);
      if (boneHead) boneHead.rotation.y = Math.sin(t*2)*0.04;
    }},
    // Stage 5 — settle, big wave-both-hands
    { dur: 1.0, fn: (t, p) => {
      const settle = easeInOut(p);
      if (boneLUpperArm) { boneLUpperArm.rotation.z = 0.6 + Math.sin(t*8)*0.12; boneLUpperArm.rotation.x = 0.2 - settle*0.2; }
      if (boneRUpperArm) { boneRUpperArm.rotation.z = -(0.6 + Math.sin(t*8+0.5)*0.12); boneRUpperArm.rotation.x = 0.2 - settle*0.2; }
      if (vrm) vrm.scene.position.z = 0;
      setExpression('happy');
    }},
  ]);
}

// ── SUB CELEBRATION (7s) ────────────────────────────────────
// Stage 1 (0.5s): freeze → eyes wide, gasp pose
// Stage 2 (1.5s): clap arms come together fast then apart (x3)
// Stage 3 (2s):   body bounce + jump (Y position bob)
// Stage 4 (2s):   step forward, point at sub, big grin
// Stage 5 (1s):   settle, blow kiss

function triggerSubCelebration() {
  playHype([
    // Gasp
    { dur: 0.5, fn: (t, p) => {
      const g = easeInOut(p);
      if (boneLUpperArm) { boneLUpperArm.rotation.z = 1.1 - g*0.4; boneLUpperArm.rotation.x = g*0.3; }
      if (boneRUpperArm) { boneRUpperArm.rotation.z = -(1.1 - g*0.4); boneRUpperArm.rotation.x = g*0.3; }
      if (boneHead) boneHead.rotation.x = g*0.1;
      setExpression('surprised');
    }},
    // Clap
    { dur: 1.8, fn: (t, p) => {
      const clap = Math.abs(Math.sin(t * 9)) ;
      if (boneLUpperArm) { boneLUpperArm.rotation.z = 0.7 - clap*0.5; boneLUpperArm.rotation.x = 0.25 + clap*0.1; }
      if (boneRUpperArm) { boneRUpperArm.rotation.z = -(0.7 - clap*0.5); boneRUpperArm.rotation.x = 0.25 + clap*0.1; }
      if (boneLLowerArm) boneLLowerArm.rotation.z =  0.3 + clap*0.4;
      if (boneRLowerArm) boneRLowerArm.rotation.z = -(0.3 + clap*0.4);
      if (boneSpine) boneSpine.rotation.x = clap * 0.05;
      setExpression('excited');
    }},
    // Jump bounce
    { dur: 2.0, fn: (t, p) => {
      const jump = Math.abs(Math.sin(t * 8)) * 0.12;
      if (vrm) vrm.scene.position.y = (vrm.scene.position.y || 0) + (jump - (vrm._lastJump||0));
      vrm._lastJump = jump;
      if (boneLUpperArm) { boneLUpperArm.rotation.z = 0.4 + Math.sin(t*7)*0.18; boneLUpperArm.rotation.x = 0.3; }
      if (boneRUpperArm) { boneRUpperArm.rotation.z = -(0.4 + Math.sin(t*7+0.4)*0.18); boneRUpperArm.rotation.x = 0.3; }

      if (boneHips) boneHips.rotation.z = Math.sin(t*8)*0.06;
    }},
    // Point and lean toward cam
    { dur: 2.0, fn: (t, p) => {
      if (vrm) { vrm.scene.position.y = 0; vrm._lastJump = 0; }
      const ep = easeInOut(Math.min(p*2,1));
      const ret = p > 0.5 ? easeInOut((p-0.5)*2) : 0;
      if (vrm) vrm.scene.position.z = ep*0.14 - ret*0.14;
      // Right arm points forward (at viewer / sub)
      if (boneRUpperArm) { boneRUpperArm.rotation.z = -(0.15); boneRUpperArm.rotation.x = 0.55 + Math.sin(t*3)*0.04; }
      if (boneRLowerArm) boneRLowerArm.rotation.x = 0.15;
      if (boneLUpperArm) { boneLUpperArm.rotation.z = 0.6 + Math.sin(t*4)*0.08; boneLUpperArm.rotation.x = 0.2; }
      if (boneHead) boneHead.rotation.y = -0.08; // slight look right

    { dur: 1.2, fn: (t, p) => {
      if (vrm) vrm.scene.position.z = 0;

      if (boneRLowerArm) boneRLowerArm.rotation.z = -(0.6);
      if (boneLUpperArm) boneLUpperArm.rotation.z = 1.0;
      if (boneHead) boneHead.rotation.y = -0.06;
      setExpression('happy');

}

function triggerBitsDazzle(bits = 100) {
  const scale = Math.min(1, bits / 500); // 0→1, caps at 500 bits

    // Surprised arms fly up
    { dur: 0.6, fn: (t, p) => {

      if (boneLUpperArm) { boneLUpperArm.rotation.z = 1.1 - g*0.9; boneLUpperArm.rotation.x = g*(0.3+scale*0.2); }
      if (boneRUpperArm) { boneRUpperArm.rotation.z = -(1.1 - g*0.9); boneRUpperArm.rotation.x = g*(0.3+scale*0.2); }
      if (boneHead) boneHead.rotation.x = g * 0.15;

    { dur: 2.0 + scale, fn: (t, p) => {
      const spin = Math.sin(t * (6 + scale*3)) * spinAmt;
      if (boneHips)  boneHips.rotation.z  = spin;
      if (boneSpine) boneSpine.rotation.z = -spin * 0.6;
      if (boneChest) boneChest.rotation.z = spin * 0.3;

    // Shimmy down (arms lower, chest dips)
    { dur: 1.2, fn: (t, p) => {
      const dip  = Math.abs(Math.sin(t*8)) * 0.08;

      if (boneSpine) boneSpine.rotation.x = dip - down;
      if (boneLUpperArm) boneLUpperArm.rotation.z =  0.7 + dip;
      if (boneRUpperArm) boneRUpperArm.rotation.z = -(0.7 + dip);

      if (boneLUpperArm) boneLUpperArm.rotation.z = 1.0;

// ================================================================
//  PHASE 1C — CAMERA WORK
//  Smooth lerp between IDLE / SPEAK / THINK camera states.
// ================================================================

function updateCamera(delta) {
  // Lerp current → target for all camera params
  camCurrent.z     += (camTarget.z     - camCurrent.z)     * CAM_LERP;
  camCurrent.y     += (camTarget.y     - camCurrent.y)     * CAM_LERP;
  camCurrent.lookY += (camTarget.lookY - camCurrent.lookY) * CAM_LERP;
  camCurrent.rotY  += (camTarget.rotY  - camCurrent.rotY)  * CAM_LERP;

  // Track her X position so camera pans with her (subtle, not 1:1)
  const targetCamX  = vrm ? vrm.scene.position.x * 0.25 : 0;
  camCurrent.x      = (camCurrent.x || 0) + (targetCamX - (camCurrent.x || 0)) * 0.04;

  camera.position.set(camCurrent.x || 0, camCurrent.y, camCurrent.z);
  camera.lookAt(camCurrent.x || 0, camCurrent.lookY, 0);
  camera.rotation.z = camCurrent.rotY;
}

// ── Render loop ─────────────────────────────────────────
const clock = new THREE.Clock();
let idleTime   = 0;
let blinkTimer = 0;
let nextBlink  = 3;

function render() {
  requestAnimationFrame(render);
  const delta = clock.getDelta();

  if (vrm) {
    idleTime   += delta;
    blinkTimer += delta;

    // ── Pacing system ──────────────────────────────────
    paceUpdate(delta);

    // ── Idle body sway (only when not mid-gesture) ────
    if (!gestureActive()) {
      if (boneSpine) {
        boneSpine.rotation.x = Math.sin(idleTime * 1.3) * 0.018;
        boneSpine.rotation.z = Math.sin(idleTime * 0.7) * 0.012;
      }
      if (boneChest) {
        boneChest.rotation.x = Math.sin(idleTime * 1.3 + 0.3) * 0.01;
      }
      if (boneHead) {
        boneHead.rotation.x = Math.sin(idleTime * 0.9)  * 0.025;
        boneHead.rotation.y = Math.sin(idleTime * 0.4)  * 0.06;
        boneHead.rotation.z = Math.sin(idleTime * 0.55) * 0.022;
      }
      // Only override arms if NOT pacing (pacing handles arms itself)
      if (PACE.state === 'pause') {
        if (boneLUpperArm) {
          boneLUpperArm.rotation.z =  1.1 + Math.sin(idleTime * 1.3) * 0.04;
          boneLUpperArm.rotation.x = Math.sin(idleTime * 0.6) * 0.03;
        }
        if (boneRUpperArm) {
          boneRUpperArm.rotation.z = -1.1 - Math.sin(idleTime * 1.3) * 0.04;
          boneRUpperArm.rotation.x = Math.sin(idleTime * 0.6 + 0.5) * 0.03;
        }
        if (boneLLowerArm) boneLLowerArm.rotation.z =  0.3 + Math.sin(idleTime * 1.1) * 0.02;
        if (boneRLowerArm) boneRLowerArm.rotation.z = -0.3 - Math.sin(idleTime * 1.1) * 0.02;
      }
    }

    // ── Gesture override ──────────────────────────────
    if (gesture) {
      gestureTime += delta;
      if (gestureTime < gestureDuration && GESTURES[gesture]) {
        GESTURES[gesture](gestureTime);
      } else {
        gesture = null;
        // Reset z-position if stepForward was used
        if (vrm) vrm.scene.position.z = 0;
      }
    }

    vrm.update(delta);

    // ── Eye look-at wander ────────────────────────────
    if (vrm.lookAt) {
      vrm.lookAt.yaw   = Math.sin(idleTime * 0.28) * 12;
      vrm.lookAt.pitch = Math.sin(idleTime * 0.19) * 6 - 2;
    }

    // ── Blink ─────────────────────────────────────────
    if (blinkTimer > nextBlink) {
      blinkTimer = 0;
      nextBlink  = 2.5 + Math.random() * 3;
      doBlink();
    }
  }

  // ── Camera lerp ───────────────────────────────────────
  updateCamera(delta);

  renderer.render(scene, camera);
}

function doBlink() {
  setBS('blink', 1);
  setTimeout(() => setBS('blink', 0), 120);
}

render();


// ── TTS ─────────────────────────────────────────────────
async function speak(text, mood='neutral') {
  setExpression(mood);
  setStageLight('speak', text.length * 65 + 2000);

  try {
    const controller = new AbortController();
    const ttsTimeout = setTimeout(() => controller.abort(), 6000);
    const res = await fetch(TTS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
      signal: controller.signal,
    });
    clearTimeout(ttsTimeout);

    if (res.ok) {
      const blob  = await res.blob();
      const url   = URL.createObjectURL(blob);
      const audio = new Audio(url);
      runLipSync(text);
      await new Promise((resolve) => {
        audio.onended = () => { URL.revokeObjectURL(url); resolve(); };
        audio.onerror = () => { URL.revokeObjectURL(url); resolve(); };
        audio.play().catch(() => resolve());
      });
      stopLipSync();
      setExpression('neutral');
      return;
    }
  } catch(_) {}

  await runLipSync(text);
  setExpression('neutral');
}

function runLipSync(text) {
  return new Promise((resolve) => {
    stopLipSync();
    lipSyncActive = true;
    const startTime = Date.now();
    const words     = text.split(' ');
    const msPerWord = (text.length * 62) / Math.max(words.length, 1);
    const totalMs   = words.length * msPerWord;
    const VOWELS    = new Set(['a','e','i','o','u']);

    function tick() {
      if (!lipSyncActive) return;
      lipRafId = requestAnimationFrame(tick);
      const elapsed = Date.now() - startTime;
      if (elapsed >= totalMs) { stopLipSync(); setExpression('neutral'); resolve(); return; }
      const wordIndex = Math.floor(elapsed / msPerWord);
      const word      = (words[wordIndex] || '').toLowerCase();
      const charPos   = Math.floor((elapsed % msPerWord) / msPerWord * word.length);
      const char      = word[charPos] || '';
      const isVowel   = VOWELS.has(char);
      const isSilence = char === '' || char === ' ';
      const rhythm    = Math.abs(Math.sin(elapsed * 0.018)) * 0.4 + 0.3;
      const base      = isSilence ? 0 : rhythm + (isVowel ? 0.5 : 0);
      const openness  = Math.min(1, base);
      const spread    = isVowel && (char==='i'||char==='e') ? 0.6 : 0.1;
      const round     = isVowel && (char==='o'||char==='u') ? 0.5 : 0.1;
      setBS('A', openness * 0.9);
      setBS('O', openness * round);
      setBS('I', openness * spread);
      setBS('E', openness * spread * 0.7);
      setBS('U', openness * round * 0.6);
    }
    tick();
  });
}

// ── API call ─────────────────────────────────────────────
const chatHistory = [];

async function sendMessage(message, displayName='Viewer') {
  if (!message.trim()) return;
  deadAir.reset();
  setStatus('Thinking...', 'thinking');
  sendBtn.disabled = true;

  // Camera: go to THINK while processing
  setCamMode('THINK');
  doGesture('think', 4000);

  chatHistory.push({ role:'user', content: message });

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({
        user_id:      USER_ID,
        message,
        display_name: displayName,
        history:      chatHistory.slice(-6),
        system_hint:  'Reply in 1-2 SHORT punchy sentences max. You are a live streamer — keep it quick, witty and real. No long explanations.'
      })
    });
    if (!res.ok) throw new Error('API error ' + res.status);

    const data = await res.json();
    let reply = data.reply || "Ehn ehn, I heard you!";
    const sentences = reply.match(/[^.!?]+[.!?]+/g) || [reply];
    if (sentences.length > 2) reply = sentences.slice(0,2).join(' ').trim();
    const mood = data.viewer?.mood || 'neutral';

    chatHistory.push({ role:'assistant', content: reply });
    if (chatHistory.length > 20) chatHistory.splice(0,2);

    // Camera: zoom in for speaking
    setCamMode('SPEAK');
    showBubble(reply, 'Miss OG Tinz');
    setStatus('Live ✦', 'ready');

    const moodGesture = {
      happy:'excited', excited:'excited', surprised:'excited',
      neutral:'talk', sad:'think', angry:'talk'
    };
    doGesture(moodGesture[mood] || 'talk', reply.length * 65);

    // Light follows mood
    const moodLight = {
      happy:'speak', excited:'sub', sad:'chill', angry:'raid', neutral:'speak'
    };
    setStageLight(moodLight[mood] || 'speak', reply.length * 65 + 2000);

    await speak(reply, mood);

    // Camera: back to idle after speaking
    setCamMode('IDLE');
    deadAir.reset();

  } catch(err) {
    console.error(err);
    const fallback = "Oya wait, my brain is loading... try again!";
    showBubble(fallback, 'Miss OG Tinz');
    await speak(fallback, 'neutral');
    setStatus('Ready ✦', 'ready');
    setCamMode('IDLE');
  }

  sendBtn.disabled = false;
}

function initTwitchChat() {
  if (typeof tmi === 'undefined') {
    console.warn('[Twitch] tmi.js not loaded');

    if (self) return;
    const username = tags['display-name'] || tags.username || 'Someone';
    queueTwitchMessage(username, message);
  });

  client.on('subscription', (channel, username) => {

    sendMessage(event, 'StreamEvent');

    const bits     = tags.bits || '?';
    setStageLight('bits', 5000);
    const event = `${username} just sent ${bits} bits! Ayyyy thank you! The support is real!`;
    sendMessage(event, 'StreamEvent');

  client.on('raided', (channel, username, viewers) => {
    setStageLight('raid', 8000);

    const event = `We are being raided by ${username} with ${viewers} viewers! Welcome welcome welcome! Come in, come in!`;
    sendMessage(event, 'StreamEvent');

  client.on('subgift', (channel, username, streakMonths, recipient) => {
    setStageLight('sub', 4000);
    doGesture('wave', 2500);
    const event = `${username} just gifted a sub to ${recipient}! Omo that is so generous! Big love!`;
    sendMessage(event, 'StreamEvent');
  });
}

// ── Message queue ────────────────────────────────────────
let _msgQueue = [];
let _msgBusy  = false;

function queueTwitchMessage(username, message) {
  const words      = message.trim().split(' ').length;
  const isQuestion = message.includes('?');
  if (words < 2 && !isQuestion) return;
  _msgQueue.push({ username, message });
  if (_msgQueue.length > 5) _msgQueue.shift();
  if (!_msgBusy) processNextMessage();
}

async function processNextMessage() {
  if (_msgQueue.length === 0) { _msgBusy = false; return; }
  _msgBusy = true;
  const { username, message } = _msgQueue.shift();
  await sendMessage(message, username);
  setTimeout(processNextMessage, 15000);
}

  const isOpen = !controlPanel.classList.contains('hidden');
  controlPanel.classList.toggle('hidden', isOpen);
  panelToggle.classList.toggle('open', !isOpen);
});

// ── Control sliders ──────────────────────────────────────
function bindSlider(id, onChange) {
  const el  = document.getElementById(id);
  const val = document.getElementById(id + '-val');
  if (!el) return;
  el.addEventListener('input', () => {
    if (val) val.textContent = el.value;
    onChange(parseFloat(el.value));
  });
}

bindSlider('posX',  v => { if (vrm) vrm.scene.position.x = v; });
bindSlider('posY',  v => { if (vrm) vrm.scene.position.y = v; });
bindSlider('posZ',  v => { if (vrm) vrm.scene.position.z = v; });
bindSlider('scale', v => { if (vrm) vrm.scene.scale.set(v,v,v); });
bindSlider('camY',  v => { camera.position.y = v; camera.lookAt(0, parseFloat(document.getElementById('lookY').value), 0); });
bindSlider('camZ',  v => { camera.position.z = v; });
bindSlider('lookY', v => { camera.lookAt(0, v, 0); });

// ── Colour pickers ───────────────────────────────────────
function bindColour(id, meshNames) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('input', () => {
    if (!vrm) return;
    const col = new THREE.Color(el.value);
    vrm.scene.traverse(obj => {
      if (obj.isMesh && meshNames.includes(obj.name)) {
        const m = obj.material;
        if (m) { m.color.set(col); m.needsUpdate = true; }
      }
    });
  });
}

bindColour('col-skin',   ['Julie_Figure','Teargum']);
bindColour('col-hair',   ['Hair_Block','Brow','Lashes']);
bindColour('col-top',    ['Top']);
bindColour('col-bottom', ['Bottom']);
bindColour('col-gold',   ['Ear_Jewel','Necklece']);

document.getElementById('btn-log')?.addEventListener('click', () => {
  if (!vrm) return;
  const p = vrm.scene.position, s = vrm.scene.scale;
  console.log(`vrm pos (${p.x.toFixed(3)}, ${p.y.toFixed(3)}, ${p.z.toFixed(3)})  scale ${s.x.toFixed(3)}`);
  console.log(`camera pos (${camera.position.x.toFixed(3)}, ${camera.position.y.toFixed(3)}, ${camera.position.z.toFixed(3)})`);
});
document.getElementById('btn-reset')?.addEventListener('click', () => location.reload());
</script>

<button id="panel-toggle">CONTROLS</button>
<div id="control-panel" class="hidden">
  <div class="ctrl-label">Position</div>
  <div class="ctrl-row"><label>X</label><input type="range" id="posX" min="-5" max="5" step="0.05" value="0"><span id="posX-val">0</span></div>
  <div class="ctrl-row"><label>Y</label><input type="range" id="posY" min="-200" max="200" step="1" value="0"><span id="posY-val">0</span></div>
  <div class="ctrl-row"><label>Z</label><input type="range" id="posZ" min="-5" max="5" step="0.05" value="0"><span id="posZ-val">0</span></div>

  <div class="ctrl-label">Scale</div>
  <div class="ctrl-row"><label>S</label><input type="range" id="scale" min="10" max="300" step="1" value="106"><span id="scale-val">106</span></div>

  <div class="ctrl-label">Camera</div>
  <div class="ctrl-row"><label>Y</label><input type="range" id="camY" min="-200" max="200" step="1" value="84"><span id="camY-val">84</span></div>
  <div class="ctrl-row"><label>Z</label><input type="range" id="camZ" min="10" max="500" step="1" value="180"><span id="camZ-val">180</span></div>
  <div class="ctrl-row"><label>LY</label><input type="range" id="lookY" min="-200" max="200" step="1" value="84"><span id="lookY-val">84</span></div>

  <hr class="ctrl-sep">
  <div class="ctrl-label">Colours</div>
  <div class="ctrl-row"><label>Skin</label><input type="color" id="col-skin" value="#c68642"></div>
  <div class="ctrl-row"><label>Hair</label><input type="color" id="col-hair" value="#0d0d0d"></div>
  <div class="ctrl-row"><label>Top</label><input type="color" id="col-top" value="#ff69b4"></div>
  <div class="ctrl-row"><label>Bot</label><input type="color" id="col-bottom" value="#ff1493"></div>
  <div class="ctrl-row"><label>Gold</label><input type="color" id="col-gold" value="#FFD700"></div>

  <hr class="ctrl-sep">
  <button class="ctrl-btn" id="btn-log">📋 Log Current Values</button>
  <button class="ctrl-btn" id="btn-reset">↺ Reset All</button>
</div>

</body>
</html>
