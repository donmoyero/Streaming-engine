<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Miss OG Tinz — Live</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --gold: #FFB830;
    --deep: #0a0a0f;
    --panel: rgba(255,255,255,0.04);
    --border: rgba(255,184,48,0.2);
    --glow: rgba(255,184,48,0.15);
    --text: #f0ece0;
    --muted: rgba(240,236,224,0.4);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--deep);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ── Studio background ── */
  #studio-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(255,140,20,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 20% 50%, rgba(255,184,48,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 50%, rgba(255,100,10,0.06) 0%, transparent 60%),
      linear-gradient(180deg, #080810 0%, #0d0d18 60%, #111118 100%);
  }

  /* floor glow */
  #studio-bg::after {
    content:'';
    position:absolute;
    bottom:0; left:50%;
    transform:translateX(-50%);
    width:900px; height:180px;
    background: radial-gradient(ellipse, rgba(255,160,30,0.18) 0%, transparent 70%);
    filter: blur(30px);
  }

  /* desk */
  #desk {
    position:absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 620px;
    height: 28px;
    background: linear-gradient(180deg, #2a1f0e 0%, #1a1208 100%);
    border-top: 2px solid rgba(255,184,48,0.4);
    border-radius: 4px 4px 0 0;
    box-shadow: 0 -8px 40px rgba(255,160,30,0.2), 0 4px 20px #000;
  }
  #desk::before {
    content:'';
    position:absolute;
    top:-1px; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity:0.6;
  }

  /* mic prop */
  #mic {
    position:absolute;
    bottom: 88px;
    left: calc(50% + 140px);
    width: 12px;
    height: 70px;
    background: linear-gradient(180deg, #333 0%, #1a1a1a 100%);
    border-radius: 6px;
  }
  #mic::before {
    content:'';
    position:absolute;
    top:-18px; left:50%;
    transform:translateX(-50%);
    width:22px; height:22px;
    border-radius:50%;
    background: radial-gradient(circle, #444, #222);
    border:1px solid #555;
    box-shadow: 0 0 10px rgba(255,184,48,0.3);
  }

  /* ── Canvas ── */
  #canvas {
    position:absolute;
    inset:0;
    width:100%; height:100%;
  }

  /* ── Chat bubble ── */
  #chat-bubble {
    position:absolute;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(10,10,15,0.85);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 22px;
    max-width: 600px;
    min-width: 200px;
    text-align:center;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    color: var(--text);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(255,184,48,0.1), 0 8px 32px rgba(0,0,0,0.5);
    opacity:0;
    transition: opacity 0.4s, transform 0.4s;
    z-index:20;
  }
  #chat-bubble.visible {
    opacity:1;
    transform: translateX(-50%) translateY(0);
  }
  #chat-bubble .speaker {
    font-size:11px;
    color: var(--gold);
    font-weight:500;
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-bottom:4px;
  }

  /* ── Name plate ── */
  #nameplate {
    position:absolute;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%);
    display:flex;
    align-items:center;
    gap:10px;
    z-index:15;
  }
  #nameplate .dot {
    width:8px; height:8px;
    border-radius:50%;
    background:var(--gold);
    box-shadow: 0 0 8px var(--gold);
    animation: pulse 2s infinite;
  }
  #nameplate .name {
    font-family:'Syne', sans-serif;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--gold);
  }
  #nameplate .tag {
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.05em;
  }

  /* ── Live badge ── */
  #live-badge {
    position:absolute;
    top:24px; right:24px;
    display:flex;
    align-items:center;
    gap:7px;
    background:rgba(255,30,30,0.15);
    border:1px solid rgba(255,60,60,0.3);
    border-radius:20px;
    padding:6px 14px;
    z-index:20;
  }
  #live-badge .dot {
    width:7px; height:7px;
    border-radius:50%;
    background:#ff3030;
    box-shadow:0 0 8px #ff3030;
    animation: pulse 1.5s infinite;
  }
  #live-badge span {
    font-family:'Syne',sans-serif;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.15em;
    color:#ff6060;
  }

  /* ── Status ── */
  #status {
    position:absolute;
    top:24px; left:24px;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.05em;
    z-index:20;
  }
  #status.ready { color: #60ff90; }
  #status.thinking { color: var(--gold); }
  #status.error { color: #ff6060; }

  /* ── Chat input (for testing) ── */
  #chat-input-area {
    position:absolute;
    bottom:16px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:8px;
    z-index:30;
    width:580px;
  }
  #chat-input {
    flex:1;
    background:rgba(255,255,255,0.06);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 16px;
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    font-size:13px;
    outline:none;
  }
  #chat-input::placeholder { color:var(--muted); }
  #chat-input:focus { border-color:rgba(255,184,48,0.5); }
  #send-btn {
    background:var(--gold);
    color:#0a0a0f;
    border:none;
    border-radius:10px;
    padding:10px 20px;
    font-family:'Syne',sans-serif;
    font-size:12px;
    font-weight:700;
    letter-spacing:0.08em;
    cursor:pointer;
    transition:opacity 0.2s;
  }
  #send-btn:hover { opacity:0.85; }
  #send-btn:disabled { opacity:0.4; cursor:default; }

  @keyframes pulse {
    0%,100%{ opacity:1; }
    50%{ opacity:0.4; }
  }

  /* loading overlay */
  #loader {
    position:absolute;
    inset:0;
    background:var(--deep);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:16px;
    z-index:100;
    transition:opacity 0.6s;
  }
  #loader.hidden { opacity:0; pointer-events:none; }
  #loader .logo {
    font-family:'Syne',sans-serif;
    font-size:28px;
    font-weight:800;
    color:var(--gold);
    letter-spacing:0.1em;
  }
  #loader .sub {
    font-size:12px;
    color:var(--muted);
    letter-spacing:0.1em;
  }
  #loader .bar {
    width:200px; height:2px;
    background:rgba(255,255,255,0.08);
    border-radius:2px;
    overflow:hidden;
  }
  #loader .bar-fill {
    height:100%;
    background:var(--gold);
    width:0%;
    transition:width 0.3s;
    border-radius:2px;
  }

  /* ── Control Panel ── */
  #control-panel {
    position:fixed;
    top:50%;
    right:0;
    transform:translateY(-50%);
    background:rgba(10,10,15,0.92);
    border:1px solid var(--border);
    border-right:none;
    border-radius:12px 0 0 12px;
    padding:14px;
    width:220px;
    z-index:50;
    backdrop-filter:blur(12px);
    font-size:12px;
    transition: transform 0.3s;
  }
  #control-panel.hidden { transform: translateY(-50%) translateX(225px); }
  #panel-toggle {
    position:fixed;
    top:50%;
    right:0;
    transform:translateY(-50%);
    background:var(--gold);
    color:#000;
    border:none;
    border-radius:8px 0 0 8px;
    padding:10px 6px;
    cursor:pointer;
    font-family:'Syne',sans-serif;
    font-size:10px;
    font-weight:700;
    writing-mode:vertical-rl;
    letter-spacing:0.1em;
    z-index:51;
    transition: right 0.3s;
  }
  #panel-toggle.open { right: 221px; }
  .ctrl-label {
    color:var(--gold);
    font-family:'Syne',sans-serif;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin:10px 0 4px;
    font-size:10px;
  }
  .ctrl-label:first-child { margin-top:0; }
  .ctrl-row {
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:6px;
  }
  .ctrl-row label { color:var(--muted); width:20px; font-size:11px; }
  .ctrl-row input[type=range] {
    flex:1;
    accent-color:var(--gold);
    height:3px;
  }
  .ctrl-row span { color:var(--text); width:36px; font-size:10px; text-align:right; }
  .ctrl-row input[type=color] {
    width:32px; height:22px;
    border:1px solid var(--border);
    border-radius:4px;
    background:none;
    cursor:pointer;
    padding:1px;
  }
  .ctrl-sep { border:none; border-top:1px solid var(--border); margin:10px 0; }
  .ctrl-btn {
    width:100%;
    background:rgba(255,184,48,0.12);
    border:1px solid var(--border);
    border-radius:6px;
    color:var(--gold);
    font-family:'Syne',sans-serif;
    font-size:10px;
    font-weight:700;
    letter-spacing:0.08em;
    padding:6px;
    cursor:pointer;
    margin-top:4px;
  }
  .ctrl-btn:hover { background:rgba(255,184,48,0.25); }
</style>
</head>
<body>

<div id="loader">
  <div class="logo">MISS OG TINZ</div>
  <div class="sub">Loading avatar...</div>
  <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
</div>

<div id="studio-bg"></div>
<div id="desk"></div>
<div id="mic"></div>

<canvas id="canvas"></canvas>

<div id="live-badge">
  <div class="dot"></div>
  <span>LIVE</span>
</div>

<div id="status">Initialising...</div>

<div id="chat-bubble">
  <div class="speaker">Miss OG Tinz</div>

</div>

<div id="nameplate">
  <div class="dot"></div>

</div>

  <input id="chat-input" type="text" placeholder="Chat with Miss OG Tinz..." maxlength="200"/>

<!-- Three.js + VRM -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

// ── Config ─────────────────────────────────────────────
const VRM_PATH   = '/Streaming-engine/MissOgTinz_Master.vrm';
const API_URL    = 'https://impactgrid-dijo.onrender.com/chat/message';
const USER_ID    = 'stream-viewer-' + Math.random().toString(36).slice(2,8);

// ── Elements ────────────────────────────────────────────
const canvas    = document.getElementById('canvas');
const loader_el = document.getElementById('loader');
const bar_fill  = document.getElementById('bar-fill');
const status_el = document.getElementById('status');
const bubble    = document.getElementById('chat-bubble');
const bubbleTxt = document.getElementById('bubble-text');
const chatInput = document.getElementById('chat-input');
const sendBtn   = document.getElementById('send-btn');

function setStatus(msg, cls='') {
  status_el.textContent = msg;
  status_el.className = cls;
}

function setProgress(p) {
  bar_fill.style.width = p + '%';
}

// ── Three.js Scene ──────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, window.innerWidth/window.innerHeight, 0.1, 999999);
camera.position.set(0, 0.8, 4);
camera.lookAt(0, 0.8, 0);

// Lighting
const ambient = new THREE.AmbientLight(0xffffff, 1.2);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xfff5e0, 2.5);
keyLight.position.set(1.5, 3, 2);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xffe0b0, 1.2);
fillLight.position.set(-2, 1, 1);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffb830, 0.4);
rimLight.position.set(0, 2, -3);
scene.add(rimLight);

// ── Load VRM ────────────────────────────────────────────
let vrm = null;
let mixer = null;

const gltfLoader = new GLTFLoader();
gltfLoader.register(parser => new VRMLoaderPlugin(parser));

setProgress(10);
setStatus('Loading Miss OG Tinz...');

gltfLoader.load(
  VRM_PATH,
  (gltf) => {
    setProgress(80);
    vrm = gltf.userData.vrm;
    VRMUtils.removeUnnecessaryJoints(gltf.scene);

    // Colour map — solid colours per mesh (no textures in VRM export)
    const MESH_COLOURS = {
      Julie_Figure: 0xc68642,
      Brow:         0x1a0a00,
      Teargum:      0xc68642,
      Ear_Jewel:    0xFFD700,
      Eye_R:        0x3b2314,
      Eyes_L:       0x3b2314,
      Lashes:       0x050505,
      Teeth:        0xfffaf0,
      Hair_Block:   0x0d0d0d,
      Top:          0xff69b4,
      Bottom:       0xff1493,
      Shoe_R:       0x222222,
      Shoe_L:       0x222222,
      Necklece:     0xFFD700,
    };

    vrm.scene.traverse((obj) => {
      if (!obj.isMesh) return;
      obj.frustumCulled = false;
      const name = obj.name;
      const isMetallic = name.includes('Jewel') || name.includes('Necklece');
      const isSkin     = name === 'Julie_Figure' || name === 'Teargum';
      const isEye      = name === 'Eye_R' || name === 'Eyes_L';
      const isLash     = name === 'Lashes';
      const isTooth    = name === 'Teeth';

      if (isEye) {
        // Build a realistic eye: white sclera base + dark iris canvas texture
        const eyeCanvas  = document.createElement('canvas');
        eyeCanvas.width  = 128;
        eyeCanvas.height = 128;
        const ctx = eyeCanvas.getContext('2d');

        // Sclera (white)
        ctx.fillStyle = '#f5f0e8';
        ctx.fillRect(0, 0, 128, 128);

        // Iris — warm dark brown
        const grad = ctx.createRadialGradient(64,64,4, 64,64,38);
        grad.addColorStop(0,   '#1a0a00');
        grad.addColorStop(0.4, '#3b1f0a');
        grad.addColorStop(0.8, '#5c3010');
        grad.addColorStop(1,   '#2a1205');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(64,64,38,0,Math.PI*2); ctx.fill();

        // Pupil
        ctx.fillStyle = '#050202';
        ctx.beginPath(); ctx.arc(64,64,18,0,Math.PI*2); ctx.fill();

        // Catchlight — makes eyes look alive
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.beginPath(); ctx.arc(74,52,8,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath(); ctx.arc(54,72,4,0,Math.PI*2); ctx.fill();

        // Limbal ring (dark edge of iris)
        ctx.strokeStyle = '#0d0500';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(64,64,38,0,Math.PI*2); ctx.stroke();

        const eyeTex = new THREE.CanvasTexture(eyeCanvas);
        obj.material = new THREE.MeshStandardMaterial({
          map:       eyeTex,
          roughness: 0.05,
          metalness: 0.0,
          side:      THREE.FrontSide,
        });
      } else if (isLash) {
        obj.material = new THREE.MeshStandardMaterial({
          color: 0x050202, roughness: 0.9, metalness: 0,
          side: THREE.DoubleSide,
        });
      } else if (isTooth) {
        obj.material = new THREE.MeshStandardMaterial({
          color: 0xfff8f0, roughness: 0.4, metalness: 0, side: THREE.FrontSide,
        });
      } else {
        const hexColour = MESH_COLOURS[name] ?? 0xb5743a;
        obj.material = new THREE.MeshStandardMaterial({
          color:      hexColour,
          roughness:  isSkin ? 0.52 : isMetallic ? 0.18 : 0.72,
          metalness:  isMetallic ? 0.88 : 0.0,
          side:       THREE.FrontSide,
          depthWrite: true,
        });
      }
    });

    // Face camera FIRST, then measure
    VRMUtils.rotateVRM0(vrm);

    // Arms are controlled by the render loop after cacheBones()

    // Add at scale 1, measure, then auto-scale to 1.7m
    vrm.scene.scale.set(1, 1, 1);
    vrm.scene.position.set(0, 0, 0);
    scene.add(vrm.scene);

    const boxRaw    = new THREE.Box3().setFromObject(vrm.scene);
    const sizeRaw   = boxRaw.getSize(new THREE.Vector3());
    const centerRaw = boxRaw.getCenter(new THREE.Vector3());
    console.log("VRM loaded! Children:", vrm.scene.children.length);
    console.log("VRM raw center:", centerRaw, "size:", sizeRaw);

    const scaleVal = 1.7 / sizeRaw.y;
    vrm.scene.scale.set(scaleVal, scaleVal, scaleVal);
    vrm.scene.position.set(
      -centerRaw.x * scaleVal,
      -boxRaw.min.y * scaleVal,
      -centerRaw.z * scaleVal
    );

    const box  = new THREE.Box3().setFromObject(vrm.scene);
    const size = box.getSize(new THREE.Vector3());
    console.log("VRM final size:", size);

    // Cache bone refs for animation loop
    cacheBones();

    // Camera: show full body with slight headroom
    const fovRad = camera.fov * (Math.PI / 180);
    const camZ   = (size.y / 2) / Math.tan(fovRad / 2) * 1.18;
    const camY   = size.y * 0.5;
    camera.position.set(0, camY, camZ);
    camera.lookAt(0, camY, 0);
    console.log("Camera auto-fit done, camZ:", camZ.toFixed(2), "camY:", camY.toFixed(2));

    setProgress(100);
    setTimeout(() => {
      loader_el.classList.add('hidden');
      setStatus('Ready ✦', 'ready');
      showBubble("Heyyy! Welcome to the stream! What's good?", "Miss OG Tinz");
      startIdleAnimation();
    }, 400);
  },
  (progress) => {
    const p = 10 + (progress.loaded / (progress.total || 1)) * 65;
    setProgress(Math.min(p, 75));
  },
  (error) => {
    console.error(error);
    setStatus('Failed to load VRM — check file path', 'error');
    loader_el.querySelector('.sub').textContent = 'Error loading avatar. Check console.';
  }
);

// ── Blendshape helpers ──────────────────────────────────
function setBS(name, value) {
  if (!vrm) return;
  try {
    vrm.expressionManager?.setValue(name, Math.max(0, Math.min(1, value)));
  } catch(e) {}
}

// ── Lip Sync ────────────────────────────────────────────
// Drives mouth shapes in real-time from TTS audio analysis
// Without audio: drives from text length as a fallback

let lipSyncActive = false;
let lipSyncTimer  = null;

const MOUTH_SHAPES = ['aa', 'ih', 'ou', 'ee', 'oh'];
const BLENDSHAPE_MAP = { aa:'A', ih:'I', ou:'U', ee:'E', oh:'O' };

function startLipSync(durationMs) {
  lipSyncActive = true;
  clearInterval(lipSyncTimer);

  const startTime = Date.now();
  lipSyncTimer = setInterval(() => {
    if (!lipSyncActive || Date.now() - startTime > durationMs) {
      stopLipSync();
      return;
    }
    // Cycle mouth shapes to simulate talking
    const t = (Date.now() - startTime) / 1000;
    const openAmount = Math.abs(Math.sin(t * 8)) * 0.7 + 0.1;
    const shape = MOUTH_SHAPES[Math.floor(t * 4) % MOUTH_SHAPES.length];

    // Reset all mouth shapes
    MOUTH_SHAPES.forEach(s => setBS(BLENDSHAPE_MAP[s], 0));
    setBS(BLENDSHAPE_MAP[shape], openAmount);
  }, 50);
}

function stopLipSync() {
  lipSyncActive = false;
  clearInterval(lipSyncTimer);
  MOUTH_SHAPES.forEach(s => setBS(BLENDSHAPE_MAP[s], 0));
}

// ── Expression mapping ──────────────────────────────────
function setExpression(mood) {
  // Reset all
  ['happy','angry','sad','relaxed','surprised'].forEach(e => setBS(e, 0));
  ['joy','angry','sorrow','fun','neutral'].forEach(e => setBS(e, 0));

  const map = {
    happy:     () => { setBS('joy', 0.8); setBS('happy', 0.8); },
    excited:   () => { setBS('joy', 1.0); setBS('fun', 0.6); },
    angry:     () => { setBS('angry', 0.7); },
    sad:       () => { setBS('sorrow', 0.7); setBS('sad', 0.6); },
    neutral:   () => { setBS('neutral', 0.3); },
    surprised: () => { setBS('surprised', 0.8); }
  };

  (map[mood] || map.neutral)();
}

// ── Idle animation ──────────────────────────────────────
let idleTime = 0;
let blinkTimer = 0;
let nextBlink = 3;

function startIdleAnimation() {
  // Handled in render loop
}

// ── Gesture system ───────────────────────────────────────
// Layered on top of idle — temporary pose overrides
let gesture = null;
let gestureTime = 0;
let gestureDuration = 0;

const GESTURES = {
  // Thinking: one hand raised to chin
  think: (t) => {
    if (!boneLUpperArm || !boneRUpperArm) return;
    boneLUpperArm.rotation.z = 1.1 + Math.sin(t*0.8)*0.03;
    boneRUpperArm.rotation.z = -(0.5 + Math.sin(t*0.6)*0.04);
    boneRUpperArm.rotation.x = 0.6 + Math.sin(t*0.4)*0.02;
    if (boneRLowerArm) boneRLowerArm.rotation.z = -(0.9 + Math.sin(t*0.5)*0.02);
  },
  // Talking: both hands slightly up and gesturing
  talk: (t) => {
    if (!boneLUpperArm || !boneRUpperArm) return;
    const wave = Math.sin(t * 6) * 0.12;
    boneLUpperArm.rotation.z =  0.8 + wave;
    boneRUpperArm.rotation.z = -(0.8 + wave * 0.7);
    boneLUpperArm.rotation.x = 0.15 + Math.sin(t*4)*0.08;
    boneRUpperArm.rotation.x = 0.15 + Math.sin(t*4+1)*0.08;
    if (boneLLowerArm) boneLLowerArm.rotation.z =  0.5 + Math.sin(t*5)*0.1;
    if (boneRLowerArm) boneRLowerArm.rotation.z = -(0.5 + Math.sin(t*5+0.5)*0.1);
  },
  // Wave hello: right arm waves
  wave: (t) => {
    if (!boneRUpperArm) return;
    boneRUpperArm.rotation.z = -(0.3 + Math.sin(t*8)*0.25);
    boneRUpperArm.rotation.x =  0.3;
    if (boneRLowerArm) boneRLowerArm.rotation.z = -(0.2 + Math.sin(t*8+0.5)*0.2);
    if (boneLUpperArm) boneLUpperArm.rotation.z =  1.1;
  },
  // Excited: both arms up
  excited: (t) => {
    if (!boneLUpperArm || !boneRUpperArm) return;
    boneLUpperArm.rotation.z =  0.4 + Math.sin(t*7)*0.15;
    boneRUpperArm.rotation.z = -(0.4 + Math.sin(t*7+0.3)*0.15);
    boneLUpperArm.rotation.x =  0.2;
    boneRUpperArm.rotation.x =  0.2;
  }
};

function doGesture(name, durationMs = 3000) {
  gesture = name;
  gestureTime = 0;
  gestureDuration = durationMs / 1000;
}

// ── Chat bubble ─────────────────────────────────────────
let bubbleTimeout = null;

function showBubble(text, speaker='Miss OG Tinz') {
  bubbleTxt.textContent = text;
  bubble.querySelector('.speaker').textContent = speaker;
  bubble.classList.add('visible');
  clearTimeout(bubbleTimeout);
  const displayTime = Math.max(4000, text.length * 60);
  bubbleTimeout = setTimeout(() => bubble.classList.remove('visible'), displayTime);
}

// ── Render loop ─────────────────────────────────────────
const clock = new THREE.Clock();

// Cache bone refs after VRM loads (set in onLoad)
let boneHead = null, boneSpine = null, boneChest = null;
let boneHipL = null, boneHipR = null;
let boneLUpperArm = null, boneRUpperArm = null;
let boneLLowerArm = null, boneRLowerArm = null;

function cacheBones() {
  if (!vrm || !vrm.humanoid) return;
  const h = vrm.humanoid;
  boneHead      = h.getNormalizedBoneNode('head');
  boneSpine     = h.getNormalizedBoneNode('spine');
  boneChest     = h.getNormalizedBoneNode('chest');
  boneHipL      = h.getNormalizedBoneNode('leftUpperLeg');
  boneHipR      = h.getNormalizedBoneNode('rightUpperLeg');
  boneLUpperArm = h.getNormalizedBoneNode('leftUpperArm');
  boneRUpperArm = h.getNormalizedBoneNode('rightUpperArm');
  boneLLowerArm = h.getNormalizedBoneNode('leftLowerArm');
  boneRLowerArm = h.getNormalizedBoneNode('rightLowerArm');
  console.log('Bones cached:', {boneHead, boneSpine, boneLUpperArm, boneRUpperArm});
}

function render() {
  requestAnimationFrame(render);
  const delta = clock.getDelta();

  if (vrm) {
    idleTime   += delta;
    blinkTimer += delta;

    // ── Apply idle BEFORE vrm.update so normalized pose is set ──
    if (boneSpine) {
      // Breathing: chest rises and falls
      boneSpine.rotation.x = Math.sin(idleTime * 1.3) * 0.018;
      boneSpine.rotation.z = Math.sin(idleTime * 0.7) * 0.012;
    }
    if (boneChest) {
      boneChest.rotation.x = Math.sin(idleTime * 1.3 + 0.3) * 0.01;
    }
    if (boneHead) {
      // Subtle head nod and tilt
      boneHead.rotation.x = Math.sin(idleTime * 0.9)  * 0.025;
      boneHead.rotation.y = Math.sin(idleTime * 0.4)  * 0.06;
      boneHead.rotation.z = Math.sin(idleTime * 0.55) * 0.022;
    }
    // Arms sway gently with breathing
    if (boneLUpperArm) {
      boneLUpperArm.rotation.z =  1.1 + Math.sin(idleTime * 1.3) * 0.04;
      boneLUpperArm.rotation.x = Math.sin(idleTime * 0.6) * 0.03;
    }
    if (boneRUpperArm) {
      boneRUpperArm.rotation.z = -1.1 - Math.sin(idleTime * 1.3) * 0.04;
      boneRUpperArm.rotation.x = Math.sin(idleTime * 0.6 + 0.5) * 0.03;
    }
    if (boneLLowerArm) boneLLowerArm.rotation.z =  0.3 + Math.sin(idleTime * 1.1) * 0.02;
    if (boneRLowerArm) boneRLowerArm.rotation.z = -0.3 - Math.sin(idleTime * 1.1) * 0.02;

    // Weight shift — hips rock side to side
    if (boneHipL) boneHipL.rotation.z =  Math.sin(idleTime * 0.8) * 0.04;
    if (boneHipR) boneHipR.rotation.z = -Math.sin(idleTime * 0.8) * 0.04;

    // Overlay active gesture on top of idle
    if (gesture) {
      gestureTime += delta;
      if (gestureTime < gestureDuration && GESTURES[gesture]) {
        GESTURES[gesture](gestureTime);
      } else {
        gesture = null; // gesture finished, return to idle
      }
    }

    // vrm.update processes expressions/lookAt AFTER we set bones
    vrm.update(delta);

    // Eye look-around (applied via lookAt API, not bones)
    if (vrm.lookAt) {
      vrm.lookAt.yaw   = Math.sin(idleTime * 0.28) * 12;  // degrees
      vrm.lookAt.pitch = Math.sin(idleTime * 0.19) * 6 - 2;
    }

    // Auto blink
    if (blinkTimer > nextBlink) {
      blinkTimer = 0;
      nextBlink  = 2.5 + Math.random() * 3;
      doBlink();
    }
  }

  renderer.render(scene, camera);
}

function doBlink() {
  setBS('blink', 1);
  setTimeout(() => setBS('blink', 0), 120);
}

render();

// ── TTS via Web Speech API ──────────────────────────────
function speak(text, mood='neutral') {
  return new Promise((resolve) => {
    if (!window.speechSynthesis) { resolve(); return; }
    window.speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance(text);
    utter.rate  = 1.05;
    utter.pitch = 1.1;

    // Try to find a female voice
    const voices = window.speechSynthesis.getVoices();
    const female = voices.find(v =>
      v.name.toLowerCase().includes('female') ||
      v.name.includes('Zira') ||
      v.name.includes('Hazel') ||
      v.name.includes('Susan') ||
      v.name.includes('Google UK English Female')
    );
    if (female) utter.voice = female;

    const duration = text.length * 65;
    setExpression(mood);
    startLipSync(duration);

    utter.onend = () => {
      stopLipSync();
      setExpression('neutral');
      resolve();
    };
    utter.onerror = () => { stopLipSync(); resolve(); };

    window.speechSynthesis.speak(utter);
  });
}

// ── API call ─────────────────────────────────────────────
const chatHistory = [];

async function sendMessage(message, displayName='Viewer') {
  if (!message.trim()) return;

  setStatus('Thinking...', 'thinking');
  sendBtn.disabled = true;
  doGesture('think', 4000);

  chatHistory.push({ role:'user', content: message });

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({
        user_id:      USER_ID,
        message,
        display_name: displayName,
        history:      chatHistory.slice(-10)
      })
    });

    if (!res.ok) throw new Error('API error ' + res.status);

    const data = await res.json();
    const reply = data.reply || "Ehn ehn, I heard you!";
    const mood  = data.viewer?.mood || 'neutral';

    chatHistory.push({ role:'assistant', content: reply });
    if (chatHistory.length > 20) chatHistory.splice(0, 2);

    showBubble(reply, 'Miss OG Tinz');
    setStatus('Live ✦', 'ready');

    // Pick gesture based on mood
    const moodGesture = {
      happy: 'excited', excited: 'excited', surprised: 'excited',
      neutral: 'talk', sad: 'think', angry: 'talk'
    };
    doGesture(moodGesture[mood] || 'talk', reply.length * 65);

    await speak(reply, mood);

  } catch(err) {
    console.error(err);
    // Fallback if no backend
    const fallback = "Oya wait, my brain is loading... try again!";
    showBubble(fallback, 'Miss OG Tinz');
    await speak(fallback, 'neutral');
    setStatus('Ready ✦', 'ready');
  }

  sendBtn.disabled = false;
}

// ── UI events ────────────────────────────────────────────
sendBtn.addEventListener('click', () => {
  const msg = chatInput.value.trim();
  if (!msg) return;
  chatInput.value = '';
  sendMessage(msg, 'You');
});

chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendBtn.click();
});

// Load voices on user interaction (browser requirement)
window.speechSynthesis.onvoiceschanged = () => {};

// ── Expose for Twitch bot integration ───────────────────
// Call window.missOgTinz.receive(username, message) from your Twitch bot
window.missOgTinz = {
  receive:  (username, message) => sendMessage(message, username),
  express:  setExpression,
  gesture:  doGesture,
  speak,
  showBubble,
  wave:     () => doGesture('wave', 2500),
};

console.log('Miss OG Tinz ready. Call window.missOgTinz.receive(user, msg) to feed Twitch chat.');

// ── Control Panel toggle ─────────────────────────────────
const panelToggle  = document.getElementById('panel-toggle');
const controlPanel = document.getElementById('control-panel');

panelToggle.addEventListener('click', () => {
  const isOpen = !controlPanel.classList.contains('hidden');
  controlPanel.classList.toggle('hidden', isOpen);
  panelToggle.classList.toggle('open', !isOpen);
});

// ── Control sliders ──────────────────────────────────────
function bindSlider(id, onChange) {
  const el  = document.getElementById(id);
  const val = document.getElementById(id + '-val');
  if (!el) return;
  el.addEventListener('input', () => {
    if (val) val.textContent = el.value;
    onChange(parseFloat(el.value));
  });
}

bindSlider('posX',  v => { if (vrm) vrm.scene.position.x = v; });
bindSlider('posY',  v => { if (vrm) vrm.scene.position.y = v; });
bindSlider('posZ',  v => { if (vrm) vrm.scene.position.z = v; });
bindSlider('scale', v => { if (vrm) vrm.scene.scale.set(v, v, v); });
bindSlider('camY',  v => { camera.position.y = v; camera.lookAt(0, parseFloat(document.getElementById('lookY').value), 0); });
bindSlider('camZ',  v => { camera.position.z = v; });
bindSlider('lookY', v => { camera.lookAt(0, v, 0); });

// ── Colour pickers ───────────────────────────────────────
function bindColour(id, meshNames) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('input', () => {
    if (!vrm) return;
    const col = new THREE.Color(el.value);
    vrm.scene.traverse(obj => {
      if (obj.isMesh && meshNames.includes(obj.name)) {
        const m = obj.material;
        if (m) { m.color.set(col); m.needsUpdate = true; }
      }
    });
  });
}

bindColour('col-skin',   ['Julie_Figure', 'Teargum']);
bindColour('col-hair',   ['Hair_Block', 'Brow', 'Lashes']);
bindColour('col-top',    ['Top']);
bindColour('col-bottom', ['Bottom']);
bindColour('col-gold',   ['Ear_Jewel', 'Necklece']);

document.getElementById('btn-log')?.addEventListener('click', () => {
  if (!vrm) return;
  const p = vrm.scene.position, s = vrm.scene.scale;
  console.log(`vrm pos (${p.x.toFixed(3)}, ${p.y.toFixed(3)}, ${p.z.toFixed(3)})  scale ${s.x.toFixed(3)}`);
  console.log(`camera pos (${camera.position.x.toFixed(3)}, ${camera.position.y.toFixed(3)}, ${camera.position.z.toFixed(3)})`);
});

document.getElementById('btn-reset')?.addEventListener('click', () => location.reload());
</script>
