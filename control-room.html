<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miss OG Tinz — Control Room</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #080810;
    --surface:  #0f0f1c;
    --border:   rgba(255,255,255,0.07);
    --pink:     #ff50b4;
    --purple:   #9b5cff;
    --orange:   #ff8c42;
    --text:     #e8e8f0;
    --muted:    rgba(232,232,240,0.45);
    --card-bg:  rgba(255,255,255,0.04);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 32px;
  }

  /* Subtle noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .wrap { max-width: 820px; margin: 0 auto; position: relative; z-index: 1; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 36px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    background: linear-gradient(120deg, var(--pink), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
    50%      { box-shadow: 0 0 0 4px rgba(34,197,94,0); }
  }

  /* Section label */
  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Current topic card */
  .topic-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .topic-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--pink), var(--purple));
    border-radius: 3px 0 0 3px;
  }

  .topic-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .topic-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
  }

  .tag {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
  }

  .topic-intro {
    margin-top: 10px;
    font-size: 13px;
    font-style: italic;
    color: rgba(255,255,255,0.4);
    line-height: 1.5;
    border-left: 2px solid rgba(255,80,180,0.25);
    padding-left: 12px;
  }

  /* Timer bar */
  .timer-wrap {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .timer-bar-track {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }

  .timer-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), var(--purple));
    border-radius: 3px;
    transition: width 1s linear;
  }

  .timer-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    min-width: 40px;
    text-align: right;
  }

  /* Controls grid */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: none;
    border-radius: 12px;
    padding: 14px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: #fff;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(155,92,255,0.35); }

  .btn-secondary {
    background: var(--card-bg);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: rgba(255,255,255,0.07); }

  .btn-danger {
    background: rgba(239,68,68,0.12);
    color: #f87171;
    border: 1px solid rgba(239,68,68,0.2);
  }

  .btn-danger:hover { background: rgba(239,68,68,0.2); }

  /* Override input */
  .override-row {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  .override-input {
    flex: 1;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .override-input::placeholder { color: var(--muted); }
  .override-input:focus { border-color: rgba(155,92,255,0.4); }

  /* History feed */
  .history-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
  }

  .history-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .history-item:last-child { border-bottom: none; }

  .history-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    min-width: 20px;
    margin-top: 2px;
  }

  .history-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.4;
  }

  .history-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    margin-left: auto;
    min-width: 60px;
    text-align: right;
    margin-top: 2px;
  }

  .empty-state {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(15,15,28,0.95);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    white-space: nowrap;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">Miss OG Tinz — Control Room</div>
    <div class="status-pill">
      <div class="status-dot"></div>
      Autonomous Mode Active
    </div>
  </header>

  <!-- Current Topic -->
  <div class="section-label">Now Talking About</div>
  <div class="topic-card" id="topic-card">
    <div class="topic-title" id="current-title">Fetching topic…</div>
    <div class="topic-meta">
      <span class="tag" id="current-source">—</span>
      <span id="current-age">—</span>
    </div>
    <div class="topic-intro" id="current-intro" style="display:none"></div>
    <div class="timer-wrap">
      <div class="timer-bar-track">
        <div class="timer-bar-fill" id="timer-fill" style="width:100%"></div>
      </div>
      <div class="timer-label" id="timer-label">—</div>
    </div>
  </div>

  <!-- Quick controls -->
  <div class="controls">
    <button class="btn btn-primary" onclick="rotateTopic()">
      ⟳ &nbsp;Skip to Next Topic
    </button>
    <button class="btn btn-secondary" onclick="refreshHistory()">
      ↻ &nbsp;Refresh History
    </button>
  </div>

  <!-- Override -->
  <div class="section-label">Emergency Override</div>
  <div class="override-row">
    <input
      class="override-input"
      id="override-input"
      type="text"
      placeholder="Type a topic to force immediately…"
      onkeydown="if(event.key==='Enter') overrideTopic()"
    />
    <button class="btn btn-secondary" onclick="overrideTopic()">Set</button>
    <button class="btn btn-danger" onclick="clearTopic()">Clear</button>
  </div>

  <!-- History -->
  <div class="section-label">Topic History</div>
  <div class="history-card">
    <div id="history-list"><div class="empty-state">No history yet — she's just getting started</div></div>
  </div>

</div>

<div id="toast"></div>

<script>
  let currentSetAt = null;
  const MAX_TOPIC_MS = 12 * 60 * 1000;

  function timeAgo(ts) {
    const m = Math.round((Date.now() - ts) / 60000);
    if (m < 1) return 'just now';
    if (m === 1) return '1 min ago';
    return `${m} min ago`;
  }

  async function fetchStatus() {
    try {
      const res  = await fetch('/chat/topic/current');
      const data = await res.json();

      if (data.active) {
        document.getElementById('current-title').textContent  = data.title;
        document.getElementById('current-source').textContent = data.source || '—';
        document.getElementById('current-age').textContent    = `Active ${data.age_min ?? 0}m`;

        const intro = document.getElementById('current-intro');
        if (data.intro) {
          intro.textContent = `"${data.intro}"`;
          intro.style.display = 'block';
        } else {
          intro.style.display = 'none';
        }

        // Timer bar (rough estimate based on age)
        const ageMs    = (data.age_min || 0) * 60000;
        const progress = Math.max(0, 100 - (ageMs / MAX_TOPIC_MS) * 100);
        document.getElementById('timer-fill').style.width = progress + '%';
        document.getElementById('timer-label').textContent = `${data.age_min ?? 0}m`;
      } else {
        document.getElementById('current-title').textContent = 'Picking next topic…';
        document.getElementById('current-source').textContent = '—';
        document.getElementById('current-age').textContent   = '';
        document.getElementById('current-intro').style.display = 'none';
      }
    } catch (_) {}
  }

  async function refreshHistory() {
    try {
      const res  = await fetch('/chat/topic/history');
      const data = await res.json();
      const list = data.history || [];
      const el   = document.getElementById('history-list');

      if (!list.length) {
        el.innerHTML = '<div class="empty-state">No history yet</div>';
        return;
      }

      el.innerHTML = [...list].reverse().map((t, i) => `
        <div class="history-item">
          <div class="history-num">${list.length - i}</div>
          <div class="history-text">${escHtml(t.title)}</div>
          <div class="history-time">${timeAgo(t.at)}</div>
        </div>
      `).join('');
    } catch (_) {}
  }

  async function rotateTopic() {
    try {
      await fetch('/chat/topic/rotate', { method: 'POST' });
      toast('⟳ New topic incoming…');
      setTimeout(() => { fetchStatus(); refreshHistory(); }, 1200);
    } catch (_) { toast('⚠ Could not rotate topic'); }
  }

  async function overrideTopic() {
    const input = document.getElementById('override-input');
    const title = input.value.trim();
    if (!title) return;
    try {
      await fetch('/chat/topic/override', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ title }),
      });
      input.value = '';
      toast('✓ Topic overridden');
      setTimeout(fetchStatus, 800);
    } catch (_) { toast('⚠ Override failed'); }
  }

  async function clearTopic() {
    try {
      await fetch('/chat/topic/clear', { method: 'POST' });
      toast('Topic cleared — she\'ll pick a fresh one shortly');
      setTimeout(fetchStatus, 800);
    } catch (_) {}
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  // Poll every 6 seconds
  fetchStatus();
  refreshHistory();
  setInterval(fetchStatus, 6000);
  setInterval(refreshHistory, 30000);
</script>
</body>
</html>
